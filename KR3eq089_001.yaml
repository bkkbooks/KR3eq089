body:
  text: 卷上傷寒外感之總名也傷寒論統論外感之書也注難經云傷寒有五則五種外感昔人皆謂之傷寒矣傷寒論有治風治溫治喝治濕諸法則非專論一傷寒矣傷寒論云太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒是正傷寒病也注傷寒無不發熱者此云或未發熱者乃身熱未發之時先見惡寒等證所謂無熱惡寒發於陰寒為陰邪故往往先惡寒而後發熱也脈陰陽俱緊即尺寸皆緊緊為坎中滿之象坎為寒水之卦故傷寒之脈必緊若已發熱緊必兼浮可知已太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之是正傷寒治法注寒邪凝沍表氣塞實故無汗氣喘而惡風寒麻黃湯溫散發汗之方設非正傷寒而誤用之則有亡陽之禍傷寒四時皆有有是脈有是證即用是藥諺云對證發藥旨哉言乎病勢較輕體氣稍弱者則羌防蘇芷皆可代麻黃用也若寒傷於外熱伏於內者溫散方中須佐清涼之品仿長沙大青龍之制可耳注四時皆有傷寒然冬三月乃寒水司令較三時之寒為獨盛故昔人以冬月感寒即病者為正傷寒非謂春夏秋並無傷寒也醫者苟能辨證清楚用藥自不泥於時令矣傷寒者寒傷於外而邪客於表也若其人陽氣素虛無以捍禦則外寒得以直入於內而犯臟名曰中寒蓋陽衰則陰盛也陰雖盛卻忌溫散之法因陽氣既衰其汗易出誤投溫散更速其危亟用薑附回陽破陰是為治法注陽衰則陰盛可見陰未嘗盛只緣陽衰故陰盛耳是以中寒不必隆冬之令雖盛暑之時亦有之昔人有治此而愈者乃不謂其陽衰飲冷夏月中寒而以為靜得之陰暑自誤誤人可為嘆惜薑附回陽破陰即兵家強主弱客之法傷寒論之中風為難經五種傷寒之一即後世之傷風是也蓋傷與中字義無殊如雲風傷衛寒傷營是矣後人以寒邪在表者為傷寒寒邪入里者為中寒遂疑傷輕而中重然此不過分別邪之在表在裡耳夫入里之寒何必重於在表之寒耶實因本陽既衰故客寒得以直入發表以取汗是治標也其邪不得為輕溫里以回陽是治本也其邪不必較重病分標本則本為重而重之非邪較重而重之也明乎此則越人長沙之謂風為中即謂寒為傷之意矣注後世以外感風邪為傷風虛風卒倒為中風庶二病之名目不相混也然傷中二字之義彌覺輕重懸殊矣故昧者泥於越人長沙之謂風為中而不知即是傷風竟與卒倒撲擊互相引證者誤矣風之傷人也既為五種傷寒之一夫豈小病者且風無定性不但四時有異四方不同也燥濕不齊雨晹迥判風寒風熱頃刻變遷感之於人施治有別長沙桂枝證風寒病也發汗已身灼熱者風熱病也然昔人往往知有風寒而不知有風熱傷寒論又云服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之合而觀之豈非誤以風寒藥治風熱病之變證哉漢代且然況後人乎注今人視傷風為輕小之病其頭疼發熱者則曰重傷風是未知傷風即越人長沙所謂之中風也病源不清無怪乎有過服溫燥以奪其液早投滋補以錮其邪延久成勞尚諉為傷風不醒噫醫實不醒也風熱即風溫也四時皆有冬春為甚長沙云若發汗已身灼熱者風溫也蓋言風寒為病可以桂枝湯發汗而愈若發汗而熱反灼者乃風溫病溫即熱之謂也後人不為詳玩而謂風溫為汗後壞病抑何固耶夫病本熱也加以桂枝之辛熱故液為熱迫而汗大出液去則熱愈灼故大煩渴而脈洪大二條似論一證主以白虎加人參湯正內經風淫熱淫治以甘寒之旨也惟香岩先生獨窺其微謂風溫首必犯肺先衛後氣治法初用辛涼繼以甘寒超超元箸萬古開群蒙也注傷寒論病人藏無他病條發汗則愈病常自汗出條復發其汗則愈並主桂枝湯可見桂枝湯是風寒發汗之劑不過較麻黃湯為和緩耳內經明言辛甘發散為陽豈可以治風熱之病乎更有謂桂枝湯止汗者堯封先生已辨其誤矣校近見淮陰吳氏溫病條辨一書以桂枝湯為治溫首方更屬可議刊醫林改錯云發熱有汗之證從未見桂枝湯治愈一人楊素園明府大不以為然謂嘗治風傷衛證桂枝湯半劑輒愈雄按改錯所云者乃溫熱證也若風寒傷衛豈可不遵聖法即葉案咳嗽門首列傷風數條皆從傷寒論變化至於中風內經生氣通天論謂之虛邪是本先虛而後邪中之也通評虛實論謂肥貴人則膏粱之疾也此後賢主痰主火主氣主虛諸說皆本於此細繹經文則真中風本虛邪中不可竟以為實證類中風肥甘醞釀未可概以為虛證必也隨其證之虛實而調劑之治百病無餘蘊矣中風雲乎哉注凡證有大虛者有大實者有虛中實實中虛者有虛多實少實多虛少者諸家之說皆有精義既不可廢亦不可執貴乎用之者適其當耳冬春感受風熱而病者名曰風溫前已辨之矣若冬傷於寒至春令發泄之時伏氣化熱而出名曰春溫亦曰溫病其邪自內達外故發熱而渴不惡寒也然亦有挾新感之風寒而發者雖惡風寒而口必渴若誤汗之禍不可言長沙而後知此義者惟郭白雲劉守真王安道張石頑周禹載葉香岩數君而已其書皆不可不讀也注溫者熱之漸也伏寒化熱口燥而渴故謂之溫一切溫散燥熱之藥皆不可犯奈何以喻氏之賢而誤指金鑑春月傷寒為溫病治雖合法立論大謬在涇先生非之是矣而俞惺齊毛達可僉極口讚頌未免貽誤將來冬傷於寒伏於少陰夏至前發出者名曰溫病矣若夏至後發出者名曰熱病以夏至前天氣尚溫夏至後天氣已熱皆隨時令以名其病也其名雖異其病相同故溫熱二病古人往往互稱內經則云後夏至日者為病暑亦以夏至後炎暑司令故曰病暑且在天為熱在地為火其性為暑是暑即熱之謂也第此之病暑因於伏寒化熱與吸受暑邪而病者其名雖同其因則異也注以溫熱二字命為病名似不過分其時令之氣耳然名曰溫者涼之可愈名曰熱者寒之乃瘳顧名思義治法已無餘蘊故不嫌與感冒之溫吸受之暑同名者正示人以殊途同歸之旨豈非古聖析義之精耶夏令屬火日光最烈天時乃熱人感其氣名曰傷暑亦曰中暑暑字從日曰炎暑曰酷暑皆指烈日之火而言也蓋日為衆陽之宗日出則爝火無光陽燧承之火可立至內經云歲火太過炎暑流行若三冬久霽則生燥火之病況夏月之暑乎而長沙名中熱曰暍不曰暑者所以別於夏至後發之伏氣暑病也且說文暍傷暑也故暑熱暍三者皆烈日之氣也後人昧此遂多歧說可謂不知冷熱之人矣暑為離火離中虛故暑脈亦虛暑傷氣故氣虛身熱為傷暑所謂壯火食氣也暑為陽邪天氣通於鼻鼻為肺竅肺合皮毛故暑邪由鼻入肺肺受火爍則多汗與風傷衛證相似亦以渴不渴辨之渴者燥也燥萬物者莫熯乎火故溫熱病長沙皆揭渴字以為準鵠嘉言先生云古人以燥熱為暑得其旨矣注暑從日日為天上之火故日字在上寒從冰冰為地下之水故冰字在下暑為陽邪易入心經寒為陰邪先犯膀胱霄壤不同各從其類也或有以暑為陰邪者豈非坐井觀天不見日面之語耶濕土分旺四季長夏是其正令土潤溽暑故暑濕二氣最易相合人受其感名曰濕溫亦曰濕熱即暑濕相兼之病為五種傷寒之一難經已詳其脈證而昧者逞其臆說謂濕與熱合始名為暑然則濕與寒合又將何名乎天夫寒地凍天暑地熱陰陽之對待也暑必濕熱相合而始為暑寒將何氣相合而始為寒乎若亢旱之年流金爍石禾苗欲槁河裂井枯不名酷暑而何名乎蓋濕無定體風也寒也暑也無不可合故治濕者須察其相合治暑者亦必審其有無兼濕庶無遺憾也然濕熱之病為獨多而變證甚易療治頗難惟香岩先生之法可謂空前絶後學者宜奉為金科玉律也注暑也濕也皆五氣之一也暑屬火濕屬土各居五行之一火土合德故暑濕每易相兼亦理之常也若謂暑中有濕是析一行為二也若謂濕熱合而始為暑則並二氣為一也豈五行之理未知而五氣之名未聞乎自誤誤人莫此為甚溫病熱病濕溫病治不得法皆易致死流行不已即成疫癘猶之治盜不得其法則賊黨衆而為流寇也因熱氣病氣尸氣互相膠葛即成毒癘之氣而為疫豈真天地之間另有一種異氣哉故疫之流行必在都會人煙繁萃之區若山鄉僻壤地廣人稀之處從無大疫如果另是一種不正之氣何必擇地而行哉其盛行於兵荒之後者兵荒之死亡亦在人煙繁萃之區也蓋人氣最熱紀曉嵐先生雜詩云萬家煙火暖云蒸銷盡天山太古冰自注曰烏魯木齊自設郡縣以後嬰兒出痘與內地同蓋彼處氣候極寒數載以來漸同內地人氣盛也於戲紀氏此言可謂先得我心夫上古無痘至漢始有今則罕有不出痘者矣何也生齒日繁地氣日熱所以古人最重傷寒今世偏多溫熱也費建中以治疫之法治痘豈非千古隻眼治疫之法惟清熱解毒宣氣六字為扼要而宣氣尤為首務未有氣不宣而熱能清毒能解者質諸宗匠然乎否耶注溫病雖能成疫而治溫治疫有殊吳又可混同論治未免粗疏且不知暑熱亦能成疫乾隆甲子都中暑疫熱死者無算徐後山柳崖外編嘗言之嗣有餘師愚專論熱疫惜其書未甚流行耳校宣氣之法不但用藥為然如衣被宣潔淨飲食宜淡泊臥房宜寬綽窗戶宜開爽侍人勿雜燈火少燃清風徐來疫氣自然消散反是則熱氣濁氣益為疫氣樹幟矣病家醫家皆宜識此刊痘為疫氣萬密齊王勳臣皆知之疹為疫氣惟余師愚知之故所著書名曰疫疹一得治疫專用大劑石膏曉嵐先生目擊其技之神載入閲微草堂筆記道光間歸安江筆花宗其法醫鏡載嘗治一時疫發斑用石膏至十四斤而斑始透因嘆師愚之道為不孤曩客東甌適多溫證而彼處風俗病戒穀食專啖番薯余謂溫邪初發如何可食實脾補氣之物土人以為相傳如是不之聽也且醫者用藥輒尚溫補遂致死亡接踵百無一生人皆謂之天行時疫余嘆曰此藥釀為疫非天有不正之氣乃人有不正之治耳當名其病曰藥疫比至宜黃楊素園明府述江西飛尚亦類是然則天下之大疫癘之頻吾恐釀成於藥者不止所見所聞之兩地也比之養成寇患的是確喻寒暑燥濕風乃五行之氣合於五臟行於四時者也惟火旺於夏特以暑稱暑字從日明其為烈日之氣炎炎在上也然三時之暖燠無非離照之光因不可以暑稱故有六氣之名焉其實火即暑之焰猶水即寒之質耳非五氣外另有一氣也而人之火病獨多者以風寒燥濕悉能化火五志過動無不生火何報之先生論之甚詳愚謂此皆不可以暑稱者故聖人於五氣之下贅一火字其旨深矣若以五行論言暑則火在其中矣而醫者往往不知故反復述之注何氏論火雲丹溪謂氣有餘便是火此一火也治宜清涼氣不足亦鬱而成火東垣所謂陽虛發熱也又一火也治宜甘溫以補其氣少佐甘涼以瀉其火外感暑熱燥氣增助內氣成熱此一火也治宜甘潤清涼外感風寒濕氣閉郁表氣成熱亦一火也治宜辛溫發散內傷飲食辛熱之物致火得熱愈熾此一火也宜用苦寒之劑消導之內傷飲食生冷之物致火彼遏愈怒又一火也治宜辛熱之劑消導之腎水虛致令下焦之火上炎此一火也治宜六味丸之類補水制火此水涸火炎之證上下皆熱醫者動用桂附輒云引火歸元不知引歸何處以致酷烈中上爍涸三陰殺人如麻為禍甚火腎陰盛逼其浮游之火上升又一火也治宜八味丸之類引火歸元此下寒上熱之證故用附桂補火不可誤投於陰虛證也校上論六氣君子觀夫勞字可得治勞之法況難經金匱論之最精理虛元鑑闡發甚詳讀此三書已無遺義雖脈大為煩勞傷陽可用參耆朮草甘溫以除大熱脈遲為冷勞可用薑桂雄附辛溫以振殘陽畢竟陽傷冷勞不概見而易治陰傷火勞則甚多而難治何也煩勞傷陽節其勞易而陽氣亦易復也情欲傷陰遂其情難而陰液亦難充也他欲猶易遂而男女之欲尤難遂也人非聖賢焉能發乎情止乎禮義此怨女曠男之所以多夭折而子輿氏之所以嘆美於太王也逮其病成徒藥無補為人父母者如得其情可不哀矜而早為之所乎雖然情不遂則傷陰情太縱亦傷陰故聖人又有血氣未定之戒遂而能節固位育之道哉注仁和沈文浦云夫子一則曰好德如好色再則曰吾未見好德如好色屢以德色互喻豈無謂哉蓋二者皆愛心為之也仁愛之心自然而然而不能忍是謂德心歡愛之心自然而然而不能捨是為色心此皆生與俱來固有之性故孟子曰食色性也但色有正有邪自己妻妾正色也他人婦女邪色也聖經賢傳只有禁止邪色之訓從無斷絶正色之理惟釋老二氏並正色而禁之正色斷絶則人類絶滅矣愚謂人類滅絶則天地空存彼佛老者將與鳥魯同群乎此其所以為異端之說也聖人之教惟婚嫁以時俾無怨曠更制禮以節欲俾無放溢為非如同姓不婚夫婦有別及天子諸候妃匹有數庶人非四十無子不娶妾咸有深意存焉故夫死不嫁謂之節婦有以哉有以哉若夫曠男固易成勞而怨女為尤多不僅室女錮婢師尼寡婦為然也其遂而不遂隱忍難言殆有筆楮不能罄者已外此則更有良人不淑惡姑肆虐橫逆之來吞聲曲受婦人未嘗學問焉能責其盡安於義命哉抑鬱成勞舉目皆是古人妻亡而有子者不再娶未嘗不有鑑於此焉餘三十三歲而鰥誓不再娶至四十九歲為大兒完姻子婦善持家極孝順此其明效也一得之愚敢為世人告之不但節欲可以養身而向平之願易了易云不節若則嗟若謂家庭垢誶兒女啼號之嗟皆由自不節欲所致故象曰又誰咎也其義微矣難經上損下損之論千古以為名言而後人謂自下上者為感熱損陰則是矣謂自上下者為感寒損陽則未盡然也夫暑燥火三者之傷肺可謂之感寒而始損陽乎即風寒濕三氣皆能郁肺氣以成熱內則悲傷太過則肺火自動心陽太擾則肺亦受克肝陽肆逆金反受刑豈可但泥於形寒飲冷之一端哉且上損之病世多不識緣古書皆混與他證並論也如肺熱葉焦之痿與肺癰並列之肺痿及三消證中之肺消皆上損也肺熱葉焦其證色白而毛敗即皮聚毛落之互詞上損至胃則難治故治痿獨取陽明以陽明為臟腑之海而肺金尤賴胃土以上供也蓋此證屬乾熱者多如草木遇烈日而枝葉萎軟也故以滋胃液為首務嵩崖謂風藥及溫補香燥之劑斷不可用是已間有胃中濕熱不攘亦能上熏於肺而葉焦為痿此當主以清陽明之濕熱為先所謂獨取陽明者滋之清之肺病總以治胃為本也然是否有濕必當細詳苟無濕而率用化濕之藥則液愈耗而熱愈增筋脈愈致枯乾攣縮求為弛長緩縱而不可得矣慎之慎之注若但兩足痿軟者固屬下焦精虛骨痿然脾胃主四肢陽明主束骨而利機關其中樞濕盛釀熱足痿不能用者亦宜取陽明而攘濕熱也莖痿一證人但知為陽虛而亦有陰虛者立齊所謂如木得露則森立遇酷暑則痿瘁也然陽明合於宗筋胃中濕熱太盛而下注宗筋亦能致痿不可誤認為虛也內經肺熱葉焦之痿痿雖見於外而肺葉既焦豈非肺質先痿於內乎金匱與肺癰並列之肺痿肺已痿於內而肢體未露痿象證雖不同其實同為難經一損損於肺之病也金匱論肺痿甚詳而與肺癰並列者以其見證相似故比類而辨之俾後人易於分別非謂肺痿為外證也孰知後人竟不悟其為上損哉惟理虛元鑑知陰虛統於肺然未知痿證之即為上損而粗工猶詆清金保肺之不能治損故特辨之注痿痹之痿與肺痿莖痿三證皆有液虛濕盛之分臨證極宜辨別大抵液虛者口乾而知味舌紅而無苔濕盛看口膩不知味舌有黃白苔若脈色疑似則以此審察最為扼要善食形瘦曰消善飲口燥曰渴宣明論列消渴於燥病蓋此證有燥無濕也易云火就燥風自火出內經云其傳為風消正如暑月南風赤地千里病由陰虛火熾熱極生風者乃勞證之末傳或由膏粱石藥積熱所發者亦無異乎誤藥以成勞析而言之飲不解渴曰上消即內經之膈消難經之上損以肺居膈上而金受火刑故成渴病食不充飢曰中消亦曰消中傷寒論謂之除中以胃位中樞而土為火爍故成消病胃陽發越則為除中小溲如膏曰下消即強中證亦謂之腎消以腎處下極而精被火灼故成枯病統名之曰三消者謂其肌肉消瘦也萬物得水則豐腴得火則乾癟善飲善食而乾瘦豈非火燔其液風耗其津乎注上消宜用小劑頻服以清火救肺白虎加人參湯主之善飲而小溲少者熱能消爍其水也加花粉麥冬以滋液小溲多者水液不能滲泄於外也加葛根以升清小溲有而不利者恐變水腫桂苓甘露飲清上以開下俾火降濕行治中消宜直清胃熱體實者三黃丸或調胃承氣湯體虛者黃連豬肚丸治下消宜瀉火救陰知柏八味丸或大補陰九除中證乃陰竭而胃陽外越也主死校內經又有飲一溲二之移寒證金匱有飲一溲一之腎氣丸證皆非真消渴也醫碥辨之甚詳刊飲多溲多其常也不可謂之病必其肌漸瘦削始為消渴雄自幼至今非酷暑不飲茶湯惟侵晨必以淖糜為早膳而晝夜小溲五六行既清且長較一日所飲奚止倍出哉體氣虛寒則固然設泥移寒之說何以至今無恙乎三復醫碥服其卓見健忘亦虛勞之萌也先哲云水清明而火昏濁此智愚之別水靜而神藏火躁而消亡此存亡之殊故性靜則心如止水情動則心若亡猿煩擾外馳存乎中者幾希矣存乎中者幾希則語後便忘不俟終日縱復追憶邈若山河惟當夜半雞鳴梏亡之餘靈明覆蘖日間所作所為皆歷歷能記由是言之藥雖有安心養血之功固不若自為存養之為得耳蓋七情五志動即為火皆足擾我安靜之神而痰閉血鬱又無論矣若乃精神衰短心昏然不能須臾苟非老而遺忘何以天奪其魄梏之反覆夜氣不足為存此子輿氏所致嘆於牛山之木也然泰西鄧玉函人身說概謂人記性含藏在腦凡人追憶往事驟不可得其手不覺搔腦後若索物令之出者雖兒童亦如是此其明證也愚按天台齊次風先生學問淹博記性過人後官禮部侍郎時墜馬破腦蒙古醫人刳生牛腹臥公其中並取生牛腦乘熱納公顙愈後盡忘所記不能握筆則西士之言已有徵驗蓋腦為髓海又名元神之府水足髓充則元神清湛而強記不忘矣若火炎髓竭元神漸昏未老健忘將成勞損也奚疑注俗謂事過輒忘者曰沒腦油頗與西士之論合刊泰西合信氏近著全體新論一書謂腦為主宰覺悟動作之司一身之靈在腦其說較鄧氏更詳其自序云凡天下之物莫不有理惟理未窮即知有未盡若能窮理有據則不論何人言之皆當信之蓋人同此心而心同此理固不得異其人而並異其理也勞病每兼失血治法不可執一俞惺齊論之最詳且辨仲醇三法之流弊亦皆中肯末云血溢上竅屬陽盛陰虛有升無降者十居八九若謂服苦寒藥必死則金匱之瀉心湯不幾為罪之魁哉尤為闡發至當蓋勞則火升血因火溢是其常也其氣不攝血陽虛陰必走者是其變也不知其常焉能知變惟守經者能達權苟不知常侈痰其變是為亂道內經云陰平陽祕精神乃治此為治虛之要旨後人援引大易扶陽抑陰之說以欺世甚以鰲山走馬燈為喻世皆惑之香岩先生嘗辨之曰燈之動固由於火而火之明本於油若油干則火亦滅矣可見陽脫者亦陰先竭而陽無依也注醫貴識病病識得真則硝黃麻桂皆是對病良藥病識不真則參耆歸地皆是殺人毒藥如丹溪先生善用知柏後人多議其非若識病既真辨其當用者而用之知柏亦有起死回生之力陰虛火熾之勞世豈無其證乎最可笑者黃履素執其己賦之偏欲概萬人之體著折肱漫録極詆寒涼專崇溫燥夫子曰好仁不好學其此公之謂哉刊女子陰類以血為主故陰足而經行血當外露者也男子陽類以氣為主故陰足而精通血不外露者也苟無所傷終身可以不露露即病也不過大小輕重之間耳精滑自遺每成勞損男女皆有之丹溪謂女人之帶下即男子之精遺也陰虛火動者為虛濕熱下注者為實不論虛實皆宜佐以黃柏苦能堅陰固腎寒能清熱勝濕也間有屬陽虛而當溫補者百中一二耳注治濕熱遺帶松石豬肚丸元珠端本丸陰虛者三才封髓丹六味地黃丸皆有捷效女人虛勞較多於男子者致虛致勞之途匪一不僅隱曲抑鬱也月事未行先有帶下帶下過多精髓漸渴婦女習以為常不比男子遺濁初患即知為病也逮至行經或情懷不適或起居不謹或飲食不慎皆能致病病而失治誤治馴至成勞更有妊娠産育之事稍或不慎略一誤治勞亦易致興言及此可不憐乎人子思之可不孝乎最不仁者強裹其足必欲弓小圖以悅人之目而不惜女之軀竟至因此成勞而死者尤可慘矣固軒岐所未料及也注女子裹足究不知始自何人或云起於妲己或云起於西施者皆村瞽之談也或云肇於漢唐而元人伊世珍輯嫏嬛記引修竹閣女訓謂範睢言裹足不入秦用女喻也是則戰國時已有之矣意彼時不過略為裹束如滿洲女子不任其若男子之放大耳故漢唐諸詩詠美人者並無弓履之稱逮李後主宮人窅娘始作弓月之形矯揉造作卒致亡國此簡齊先生所以罪其作俑也沈君文浦云後人沿此習成錮疾母毒其女以為慈姑虐其婦以為愛遂造億萬世億萬人無窮之孽或曰不然古人為此非飾美麗也為拘遊走也嗚呼豈理也哉未嫁則父母拘之既嫁則丈夫拘之謹其閨門嚴其出入養其羞惡課其女紅於以拘遊走也何難之有而顧為此戕賊形軀之事忍莫甚矣拙莫甚矣戒邪視而鑿其目戒邪言而截其舌豈理也哉況古來貞靜者豈盡由步之纖淫奔者豈盡由履之巨奈之何如就三木如受刖刑遂令髫齡弱質罹鞠凶於早歲遭荼毒以終身每見負痛飲疼因是而瘠病者有之由是而夭亡者有之幽閨暗獄魄滯魂冤哀平哉想我國家平成以來風同道一男子剃頭辮髮則晨夕省梳網之煩暑月受清涼之福德莫大焉何獨女子而不普沾其澤平倘亦遵路遵道順天地之自然極官骸之得所豈不休歟校裹足一事相習成風雖聖朝之仁政不能盡革其陋俗奈之何哉無已則本草綱目所採閨閣事宜一方載朴硝條下欲裹先洗庶免其疼俗傳用鳳仙花連根捶爛煎湯頻洗其足則骨漸柔軟裹之不疼亦妙方也但斷不可用猴骨洗腳恐骨雖軟有終身不能行走之害也上論虛勞刊致勞之途多矣而裹足成勞誠軒岐所未料及者邇來不論男女又於勞病門中增一坐位久吸亞片陰竭火炎漸成煙勞不能療救既促其命亦傾其家天下患之竟無大藥安得軒岐復起為生民痛下針砭哉張戴人云驚者陽從外入也恐者陰從內出也驚者謂自不知故也恐者自知也足少陽膽經屬木膽者敢也驚怕則膽傷矣內經曰驚者平之平乃平常之義如聞響而驚者常擊物作響使習聞如平常則不驚矣夫驚則神上越擊物宜在下使其下視所以收神也愚謂分驚恐為外入內出可謂一言破的古人皆云心主驚而不知情志字皆從心惟驚字從馬以馬無膽故善驚驚則傷膽允為卓識蓋人之勇懦因膽之壯怯而分觀其論治似屬元妙及至說破又極平常然豈常人所能測哉注亙古以來善治病者莫如子和先生不僅以汗吐下三法獨擅千古也魏玉橫治徐德滋女年近二十素患脅痛月事先期近因經遲數日身面發疹嘔血盆許心下若有一塊上攻必須重按抵住否則上頂悶絶脈來若有若無此經水過期乘肝火上逆而出乃地氣上攻之危證也非大劑純陰何以挽回豫熟地二兩杞子一兩連進二服即能仰臥血止脈回次日忽咳嗽無痰肺金燥而肝火未平也前方減半加沙參麥冬生地蔞仁八劑而愈愚按水火風皆地氣也薑附白通治地中水氣上逆以陽剛之品迅掃濁陰也喻氏論之詳矣此證風動火升故以純陰之品潛陽息風也可與喻氏並傳注玉橫先生治內傷專究肝腎擅滋養之長而地氣之說實發前人所未發者蔣仲芳治姚氏婦年二十五歲其月事或半年或三月方得一行溫通補益調治二載轉劇診其脈微而澀口乾唇燥手足心熱曰古法後期主寒然此證熱也因熱耗血血少故後期耳豫大劑生地當歸芩梔芎芍丹皮澤蘭知母鱉甲六劑經准一月後而孕矣注古法難執豈經遲一證為然乎以此推之凡病皆宜細審其故矣世謂孕婦腳腫為男胎且引宋少主微行徐文伯從一案為證實未然也即以此案考之少主脈之曰此女胎也文伯診之曰男胎也是以脈斷其為男非以腳腫不能行斷其為男也設腳腫果主男胎文伯豈未知之而必診而後斷乎史載其事亦以傳徐診之神非以論胎氣而誇博雅也後人誤解遂至誤傳醫書中此類甚多不可不辨注史傳徐診之神而不明言脈象者以脈難言語形容也然其診而斷之之時實以脈憑不以腳憑也此猶誤解況深微奧妙之書乎沈明生治姜敏中患衄不已去血盈斗一月後衄止復患囊癰六脈如絲精神困憊始猶健飯漸至饘粥不入諸醫皆以為虛而當補於是參耆不效桂附隨之愈補而形愈虛愈溫而氣愈冷延至冬至沈視之曰夫食雖不入而大便祕結證類虛寒而口渴喜飲則衄血之來本由邪火上熾乃遽用血脫益氣之法衄雖止而熱移於下發為囊癰既潰瘍科又泥寒藥不能收口之戒亦務溫補家人目擊病者尩羸又聞衆口言虛強令進食以久臥床蓐之人恣啖肥甘不為運動是以藥食並壅內熱外寒此病中之病初非衄與癰所致宜其愈補而愈不靈也先哲云脈浮者穀不化又云大實有羸狀誤補益疾其斯之謂歟遂力主清潤疏解以硝黃為前矛而大便立通以芩芍為後徑而飲食漸進如絲之脈一線添長久冷之軀一陽來復不惟衄不再作且令瘡口易收孰謂從脈可以舍證不思而得病情哉向非翻然易轍轉敗為功人惟知補之不效而已又安知效之不在補也故曰此事難知注人之誤於溫補者為獨多究之擅用溫補之藥者不但初無害人之心且亦有活人之意只因食古不化識證不清雖誤人之死而不自知其非自不知非則自信益堅甚而著書立說以自誤者誤後人後人不察亦誤信其自信者而貽誤於世以誤傳誤誤無底止而瘍科則尤甚焉孫東宿治潘見所患白濁精淫淫下三年不愈脈來兩寸短弱兩關滑曰疾易瘳第必明年春仲一劑可痊問故曰素問云必先歲氣毋伐天和今所患為濕痰下流證也而脈洪大見於尺部為陽乘於陰法當從陰引陽今冬令為閉藏之候冬之閉藏實為來春發生根本天人一理若強升提之是逆天時而泄元氣也後醫者接踵迄無效至春分迎孫以白螺螄殼火煅四兩為君牡蠣二兩為臣半夏葛根柴胡苦參各一兩為佐黃柏一兩為使麵糊為丸名端本丸令早晚服之不終劑而愈注此治內傷之經旨也而薛氏不拘何病不拘何時動輒補中益氣雖明知其為陰虛陽浮亦不輕割愛連篇纍犢垂訓後人余恐受其害者不止當時求治之人也讀軒岐長沙之書論瘧不止少陽一經治瘧不僅柴胡一方何以今人患瘧必以柴胡為不祧之藥耶夫風寒之瘧可以升散暑濕之瘧必須清解隨園詩話云丙子九月余患瘧早飲呂醫藥至日昳嘔逆頭眩不止家慈抱余起坐覺血氣自胸僨起命在呼吸適同徵友南豐趙藜村來訪診脈看方曰誤矣此陽明暑瘧也誤以升麻羌活提之將血逆流而上惟白虎湯可治命速買石膏加他藥投之甫飲一勺如以鈞之石將腸胃壓下血氣全消未半盂沉沉睡去額上微汗朦朧中聞家慈唶曰豈非仙丹乎逮醒趙問思西瓜否曰想甚即命儘量食之入口如醍醐灌頂晚即進粥次日愈矣愚謂隨園幸遇趙公而不死趙公幸遇隨園而案傳惜醫家不讀詩話詩家罕知醫理故録之夫升麻羌活溫散更甚於柴胡誤施於暑瘧宜乎血氣逆流吾嘗見誤用小柴胡湯於暑瘧者將熱邪肝火一併提升遂嘔逆頭眩汗出熱壯脅痛耳聾神昏欲厥醫者不察病因但泥嘔逆耳聾脅痛為少陽的證更不必辨其邪之為寒為暑而小柴胡之錯遂成鐵鑄雖病者枉死亦瞑目而安於命矣嗚呼醫事難明誠不可與傖父言也注今人因傷寒少陽篇有耳聾一證遂以小柴胡湯為外感耳聾之專方若溫熱暑濕諸感見耳聾者皆熱邪上蒸金受火刑之故也豈小柴胡之可投哉往往初不耳聾而柴胡一進其耳遂聾者柴胡提其熱邪上升使然耳隨園先生患瘧於深秋而藜村識為暑邪醫亦精矣雖無著述傳世於此可見一斑刊江西醫學偏尚溫補而南豐趙君獨能治暑洵矯矯出群不為習俗所移者夫以洄溪之賢治瘧猶概用柴胡則趙君識見之超當在洄溪之上殆為功名所纍故無傳書惜哉繆仲醇治莊斂之暴瀉初不知其中巴豆毒也因脈洪大而數故用黃連白芍橘紅車前扁豆茯苓石斛甘草煎成浸冷和童便服一劑瀉止得眠真妙方也既而早用升麻自悔不知為中毒猶可諉也逮病平出妾陰謀已發濁氣既已誤升何以熟地山萸河車耆味酸膩重濁一概亂投以致三年始愈而更藉苦降收功治法殊未盡善也注案中謂下多亡陰忌用香燥亦是名論而病人不知飢飽者顯為胃陰受傷設彼時投以甘涼養胃勿用滋重丸藥則病必易愈香岩先生云鎖喉風之為病也有閉脫二證閉證氣道祕塞關竅而死脫證大汗大吐大瀉虛脫而死閉證以開通為急脫證以補斂為要景嶽所見燕都女子之病乃閉證也夫女子善懷性執抑鬱者多年已及笄未免有難言之隱憤悶抑鬱肝氣不得疏泄決非一日交秋令則肝氣愈斂或食生冷或受寒涼郁遏肝氣肝性促急觸而暴發上干心肺之竅口不能言無腫無痛見面色之青者知其為肝病也經云暴病暴死皆屬於火火鬱於內不能外達故似寒證關竅閉塞經絡不通脈道不行多見沉滯無火之脈此時治法惟紫金丹薑湯磨灌則關隘必開因內有麝香通竅開口之後然後用二陳加菖蒲枳殼香附鬱金之類降之視為脫證用參此雪上加霜耳凡治病難明之證必有至理焉故不得不為之細辨景嶽自恃絶世聰明毀謗前賢而遇此證束手無策毫無見識而以獨參湯議補何得謂之明理乎余在新場鎮閔家一僕婦因食梨藕生冷一時喉閉鎖定不能出聲不知痛癢手足冰冷面色白而青脈息沉伏藥不能進余以前法治之而愈蓋因鬱怒食生冷而起也又治費氏女年逾二十未嫁忽然仆倒手足冰冷面色青無痰聲不開口脈息伏亦用紫金丹開口隨進藥而痊凡遇不開口無痛楚忽然而起者先以開通閉隘為第一著語言得出可以得生若以為虛妄投入參無有不死者注中風證分閉脫昔人已言之矣喉證分閉脫人所未言也先生詳為辨別厥功偉哉刊魏柳洲謂燕女之證宜用左歸合生脈因誤服辛溫解散而致肺絶與葉氏所論迥殊據理論證則葉說為優然未知曾王父從何採入故於柳洲醫話既不刪去亦不敢妄加按語今年得見葉氏景嶽發揮始知曾王父之所採尚在此書未刻之時今刻本更有批云若肺氣竭絶必自汗氣喘此是閉塞故關竅不通反復申辨學者識之藥為補偏救弊之物而治病有通因通用塞因塞用之法夫病既通矣豈可再通病既塞矣豈容再塞蓋通因通用者病雖似通而實不通如熱邪內熾無從宣泄逼迫津液妄行而下利清水或燥矢阻於陽明府氣不行而稀水旁流此似乎通而實不通故宜亟通其府俾熱邪燥矢下行則邪去正復而瀉利自止塞因塞用者病雖似塞而實非塞如氣虛不能健運以致胸痞腹脹便祕或陰虛無以涵濡以致火亢津枯氣結此似乎塞而實非塞故氣虛宜參耆等溫補以宣陽陰虛宜地冬輩滋填而補血俾氣血流暢則祕結自舒豈非仍是通治塞塞治通之常理哉凡從治之法可以類推矣注從治之法從外面見證之標而言也究其裡面致病之本而論則不拘何法無非正治靈胎先生云文中子曰醫者意也藥者瀹也謂先通其意而後用藥物以疏瀹之善哉言乎醫理在是矣而意之通實難泥一成之見而欲強人之病以就吾說其患在固執好作聰明而不窮究乎古人之成書是猶兵家之廢陳圖法吏之廢律令也其患在不學由前之說在不能用意由後之說在誤於用意夫然以不學之人與不通之識而又熾以忮同列競名利之心以此用藥其不致抱薪而救火持水而投石者幾何哉語云學書紙費學醫人費蓋為此也注固執不通者無才以勝其學也好作聰明者無學以副其才也人必有天賦之才而讀破萬卷庶可以為醫矣第人心不同既如其面而人體不同亦如其心病變無窮證隨體異治雖宜遵古訓亦須活法在人神而明之化而裁之非通才實學卓識深思者惡足以語此刊學醫人費舉世聞之而不自揣其才學輒欲為醫者日益多故昌邑黃玉楸之言曰聞之呂覽始生之者天也養成之者人也成之者遂其生也是天人之合也然生之者布帛也菽粟也殺之者若鋒刃若鼎鑊若水旱若蝗螟生之途未能十一殺之途不止十三何其生之寡而殺之多也此人事也抑天道那玉楸子曰此未足以為多也有其至多者焉屠羊說以屠羊傳而羊不哀其道孤也無何屠牛坦以屠牛傳而疱丁起其黨漸衆牛始哀矣無何高漸離以屠狗傳而聶政興朱亥出樊噲生其徒愈繁而狗始悲矣無何白起章邯之屬以戰將名寧成郅都之輩以刑官著自茲屠人者傳矣風氣開下流衆苟道將爾朱榮之徒且比肩來索元禮來俊臣之類更接踵至尤而效之抑又甚焉至於原野厭人之肉川穀流人之血人始哭矣此良可疾首痛心巳而君子未以為痛也何則大難既平且不睹兵革之事且不聞羅織之經其人死其禍絶往者已矣來者猶幸夫何庸工群起而談岐黃則殺人至多而不可勝窮者無如此甚矣不以戈鋋而人罹鋒刃不事箝網而人遭誅夷其書多其傳久其流遠其派衆其人已死其禍不絶遂使四海之大百世之遠盡飲其羽飽其鋒登其梯入其甕水旱不年有而此無免時蝗螟不歲見而此無逃期痛哉痛哉此最可痛哭流涕者也其天道乎抑人事耶雄謂此言沉痛已極足以警世故附録於此惟黃氏雖精究醫學而泥古太甚偏尚扶陽恐未深於閲歷者所以非知之艱行之艱也楊素園大令云玉楸所著各種議論悉本內經惟自負太高未免有意矜奇賢智之過往往如此斯為定評大令又謂雄曰從來趨時者鮮實學而潛心古訓者恆多不合時宜兼而能之者惟君乎雄雖愧不敢當亦不敢不勉然而難也怪力亂神雖聖人所不語然嘗曰敬鬼神而遠之矣則非無鬼神也庸人惑之儒者闢之皆愚也有病而輒事禳禱則惑矣患祟而輒云無鬼則迂矣北史顧歡取孝經置病人枕邊愈瘋顛以正勝邪可補灸鬼哭穴服八毒赤丸及移精變氣諸法之未備醫者不可不知也注此言邪祟為病間亦有之若痰證熱證及七情為病皆往往有類祟證醫者須辨明以釋病家之惑而後對證施治不可以病人稍涉狂妄即疑為鬼祟而為巫覡所欺也刊顧伊人孝廉室病鬼醫皆束手木文和尚於病榻前焚香誦中庸三復而瘳緇衣也心崇正學則聖賢之徒矣儒冠者心惑邪說即異端之流矣余嘗調俗儒不及高僧倘有行韓子之事而人其人者亦當區別以處之不可因釋老之故而概視緇黃為非類蓋有畸人逸士侘傺無聊遁跡於其間者矣怪證奇疾間或有之不可謂古書盡誣也即尋常病證之奇幻亦有古書所未載者少所見而多所怪陋矣強不知以為知妄矣不陋不妄可為名醫注病形奇怪變幻萬端古書所有者時或見之古書所無者時亦聞之蓋造物之化工莫測病機之釀疾無窮也校宋史呂夏卿得奇疾身體漸縮卒時才如小兒他書亦有載此證者揆之以理其人必平時多餌丹石熱藥以致消縮而竇材云此證宜服丹附最屬不經刊梁應來云姑丈葛秋生病瘵卒時身首縮小名縮骨勞可見近時亦有此證也竇材乃妄人耳自詡越人再世所著扁鵲心書專尚丹石欺世盜名害人不淺嗣有陳遠公所著石室祕録論證列方頗皆入理奈蹈竇材故轍假託軒岐仲景誣聖愚人貽譏後世毛達可嘗嘆惜之頃見番禺潘氏海山仙館叢書所收女科書三卷文理粗鄙剿襲甚多託名傅青主先生手著之祕本潘氏不知醫理誤信梓行玷辱青主矣無知妄作固不足論以遠公之學而托諸鬼神誡不可解也更有王養吾者將郭氏痧脹玉衡竊為己有假託深山野人之祕授編其原方為六十四卦未免傷及事主而沈芊緑不察採入尊生何丹流受愚重災梨棗案雖未破君子病之醫家臨診辨證最要凝神定氣如曾世榮於船中治王千戶子頭疼額赤諸治不效動即大哭細審知為船篷小篾刺入囟上皮內鑷去即愈苟不細心審視而率意妄治吾恐醫者道少病者人費矣注凝神定氣惟心小膽大者能之忍辱負重惟智圓行方者能之不如是不足以為名醫如臨一大證學識不足以當之則宜舉賢讓能不可蚊負以僨事學識苟足以當之而同道之識見不一各抒議論者有之簧鼓惑聽者有之陰謀排擠者有之加以親友之好惡戚黨之疑信或熱心關切或樂禍幸災投劑果然漸效群議自息病或稍有波瀾衆楚交咻斯時也若執德不宏悻悻然委而去之病付庸手坐視其危豈不輕棄人命乎且事敗之後亦未必竟無歸咎之語故非凝神定氣之心思不足以辨疑難險惡之大證無含蓄堅忍之才力不足以負扶危持顛之重任也其學識全無不知輕重亂投藥石惟利是圖者乃無恥之徒不可與忍辱負重同語矣校龍兒偶患足指焮腫脹痛適山妻往侍外姑疾瘍科治之益劇日夜啼泣不止山妻聞而遺歸滌去敷藥諦視之乃剃下短髮一莖刺入甲窖時盛暑小兒頻脫襪此必剃髮落於鞋內所致也鑷而出之遂愈正與曾案相類矣刊刺不鑷出而誤藥妄治在頭者其禍稍輕在趾者必至潰腐脫落而成殘廢緣先慈耳目之聰明迥異於人故至老不衰而又善體人情事上撫下無不欣感烹飪湯藥靡不周至戚族中如有大病必延往主裁是以病情藥性諸練亦深雄未冠以前讀景嶽全書而喜之遇證亦效其治法先慈聞而痛戒曰信道不篤見異思遷汝將為殺人之事乎吾之閲歷病證者多矣無論外感不可妄投溫補即內傷證必求其所傷何病而先治其傷則病去而元自復古人不曰內虛而曰內傷顧名思義則純虛之證殊罕見也汝何懵乎雄聆訓恍然漸有定見三十年來員不能起死人而生之尚不致釀活病為死證者先慈啓迪之教也今刊此案不禁思親之感滋補丸藥最難消化脾胃不健者斷勿輕服香岩先生云湖州沈赤文年甫冠讀書明敏父母愛之如掌珠將畢姻合全鹿丸一料少年四人分服赤文於冬令服至春初忽患渾身作痛有如痛風漸至腹中作痛有形之塊纍纍於腸飲食不進肌肉消瘦諸醫治之乃父畏用消導清火之藥惟以參術補方是從至秋初邀余診視問曰小兒晚間去黑糞如拳大者一塊目下遍身如火欲飲井水不知何故余按脈數大身體骨立驗其所下之塊黑而堅硬意為瘀血結成與酒蒸大黃丸二錢下黑塊不計用水浸之胖如黑豆詳詢所以乃全鹿丸未化也始知為藥所誤不數日熱極而死同服三少年一患喉痹而死一患肛門毒而死一患吐血咳嗽而死此皆無病而喜服溫補之害也録此以勸世人不必好補而服藥注世人之愛其子也始憂其不長衣帛食肉以揠苗繼慮其虛羸朝丸暮藥為常饌逢節則參遇勞則參釀疾延勞半由乎此雖曰愛之其實害之愚謂富貴之家何不將此終年無病所服參藥之費延醫合藥施診貧病報施不爽則我之子孫自然康強逢吉不必慮其虛羸而為無病之呻矣豈不美哉香岩先生治痘多活法嘗於肩輿中見採桑婦先生令輿人往摟之婦大怒詈其夫將扭輿人毆打先生曉之曰汝婦痘已在皮膜間因氣滯閉不能出吾特激之使怒今夜可遽發否則殆矣已而果驗又一富家子病痘閉諸醫束手先生命取新潔大漆桌十餘張裸兒臥於上以手展轉之桌熱即易如是殆遍至夜痘怒發得生又先生之外孫甫一齡痘閉不出母乃抱歸求救先生視之甚逆沉思良久裸兒鍵置空室中禁女弗啓視逮夜深始出之痘已遍體粒粒如珠因空屋多蚊借其噆膚以發也又汪益美布鋪夥友壯年患痘閉群醫不能措手先生令取雞糞若干以醇酒熱調如糊遍塗其身面手足越宿雞矢燥落裂剝而痘已出矣此皆神而明之之治録之亦可發人之慧悟然激之使發者氣閉也展轉於新漆之桌者火閉也假蚊口以嘬之者血閉也塗之以雞矢醴者寒閉也雖外治也而有分別之妙義焉苟欲效顰亦當審諦校上論治案刊徐洄溪云痘證因時而變不但歷代不同隔數十年亦有小變余謂痘證每因時邪引動而發萬密齊嘗言之王清任亦論之故不但數十年有小變即一二年間亦有判然迥異者蓋痘有痘疫瘄有瘄疫兒科拘守古法但可以治常痘此建中瑣言之所以有救偏良法也後人不知此義輒訾其浪用石膏大黃為偏謂止可以救慣用熱藥之偏豈為知人論世之言哉但痘挾疫邪非用費氏之法不可惜幼科罕讀其書不識病因往往闔境沿村夭枉載道諉諸天數豈盡然歟吾先慈幼時患痘頭面雖少遍身密布紫黑焦枯略無潤澤諸醫束手老醫包士安曰此名螺疔痘用大黃石膏多劑毫無起色奄奄一息已絶望矣偶親串中遣一越人陳嫗來探疾見而唶云尚可圖也亟以銀針將遍身之痘逐粒挑出如黑豆者一顆隨以珍珠八寶丹糝入外用朱養心家碧玉膏封之即能進粥不勞余藥而生又定州楊素園大令云阜平趙功甫邃於醫凡一切丸散人所不能辨其中為何藥者趙一嗅而知之歷試不爽殆與離婁之明易牙之舌皆為天畀之獨也生平長於治痘痘始萌一望已知其結局雖極危之證治之無不收功自云一生療痘無藥不用而從未有用附子者並識之以質治痘名家開物成務之聖人憫民疾苦救其夭札而垂以藥治病之教誠輔相裁成之大道也乃秦政漢武窮奢極欲妄求不死於是方伎進邪說興焉故今世所傳神農本草經黃帝內經等書皆有方伎之言附會其中如輕身不老久服延年等語是也即班氏藝文志亦承其陋謂方伎之別有四曰醫經曰經方曰房中曰神仙夫醫理經方皆聖王康濟蒼生之術豈可與房中神仙之邪說並列為方伎哉後人惑之淪於雜學幸天縱長沙集醫經經方之大成置房中神仙於不論炎黃大道賴以復明於戲此其所以為醫聖也或老年血氣衰弱精力不充藉藥餌以佐穀肉果菜所未逮亦人子竭力孝養之一端固未可盡非焉但弗惑於邪說妄求長生而服金石等藥以速其死耳古書惟元和紀用經以不用桂附石藥者為上丹猶為近理故首録其方於下上丹平補氣血健力加餐北五味八兩夏月再加四兩百部酒宿浸焙菟絲子酒宿浸焙淡肉蓯蓉酒浸各二兩四季土旺蓯蓉再加六兩杜仲炒巴戟肉遠志肉各二兩冬月遠志再加六兩甘枸杞二兩秋月再加六兩防風無叉枝者白茯苓蛇床子炒柏子仁另研干薯蕷各二兩上十三味用甘泉桑柴火砂鍋煎至味盡去滓將藥汁慢火熬成膏瓷器收盛封置泥地或冷水中拔去火氣每晨淡鹽湯調服數錢春月用棗湯化服注醫書有肥兒丸無養老方可見人情之厚於慈薄於孝故韓氏醫通嘗三嘆焉先府君年逾大耋神明不衰雖知醫而素不服藥獨諄諄以養老為言夫良醫不治老老豈能治之轉少哉然藥以扶老使之康健而少病未始非怡清養志之先務雖以藥扶老實以孝治人耳上丹本是丸方恐老人脾氣不健運化殊難改丸為膏俾易融洽酒宿浸者酒浸一宿也集靈膏人年五十陰氣先衰老人陰虧者多此方滋養真陰柔和筋骨西洋參取結實壯大者刮去皮飯上蒸九次日中曬九次甘杞子懷牛膝酒蒸天冬麥冬懷生地懷熟地仙靈脾上八味等分熬成膏白湯或溫酒調服注此方始見於廣筆記無仙靈脾云出內府又載於治法匯並無牛膝方後法血虛加當歸四兩脾弱加白朮四兩或八兩且云治一切氣血兩虛身弱咳嗽者罔不獲效凡少年但覺氣弱倦怠津液少虛火上炎急宜服之免成勞損後惟魏玉橫先生善用此方續名醫類案極言其功效愚謂即人參固本加味也峻補肝腎之陰實無出此方之上者原方用人參近年參價甚昂非大力者不能致易以西洋參可與貧富共之矣方名集靈則以有仙靈脾者為是理虛元鑑治勞嗽於原方去參膝加甘桔元參刊如治陰虛遺帶宜去牛膝加黃柏凡便滑者亦宜去牛膝重加生薏苡仁草靈丹老人陽氣偏虛便溺不禁者用此溫補下元可以耐冷茅山蒼朮泔水浸刮去皮飯鍋上酒蒸透川椒紅各四兩懷熟地干薯蕷各三兩炙甘草茯苓各二兩茴香二兩鹽水炒川烏制一兩上八味將六味研細末以熟地杵膏薯蕷煮糊共杵丸梧子大每三十丸空心淡鹽湯下以干食物壓之注脾腎兩虧內挾寒濕者此方宜方若陰虛火盛之人不可服也十灰散治吐血咯血嗽血先用此藥止之大薊小薊荷葉扁柏葉茅根茜根梔子大黃丹皮棕櫚皮上十味等分燒灰存性研極細末以紙包置泥地上一夕出火氣每服五錢藕汁或蘆蔔汁或京墨汁半碗調服注按原注云吐血者競推葛氏而先生首以此方止血明明劫劑毫無顧忌細玩始知先生意之到理之精也人生於陽根於陰陰氣虧則陽自勝上氣為之喘促咳吐痰沫發熱面紅無不相因而至故留得一分自家之血即減得一分上升之火易為收拾何今日之醫動以引火歸經為談不可概用止血之味甚至有吐出亦美壅反為害遂令遷延時日陰虛陽旺煎熬不止至於不救果誰之咎執引經而緩時日冀復元神吾恐有形之血豈能使之速生而無偶之陽何法使之速降此先生所以急於止血之大旨也刊諸藥燒黑皆能止血故以十灰名其方然止澀之品僅棕櫚一味余皆清血之熱行血之滯破血之瘀者合以為劑雖主止血而無兜澀留瘀之弊雄每用之並無後患何可視為劫劑乎太平丸治久嗽肺萎肺癰天冬麥冬知母川貝母款冬花各三兩杏仁當歸熟地生地黃連各一兩五錢蒲黃京墨桔梗薄荷各一兩上十四味研細末和勻以白蜜四兩於銀石器中煉熟再入黑驢皮膠一兩五錢俟煬後下諸藥末攪勻再入麝香少許熬二三沸即丸彈子大食後細嚼一丸薄荷湯緩緩化下臨臥噙此丸仰臥使藥流入肺竅則肺清嗽減凡咳嗽服此七日自痊注肺居膈上湯藥蕩滌宜下已過病所宜乎難效此噙化法之所以妙也後莊一生治氣鬱痰凝胸膈痞塞用人參貝母苦參沉香薄荷為末蜜丸噙口中聽其自化徐徐沁入可謂善得師者潤肺膏治久嗽肺燥肺萎羊肺一具杏仁淨研柿霜真酥真粉各一兩白蜜二兩上將羊肺洗淨次將五味入水攪黏灌入肺中白水煮熟如常服食注按原注云血去則燥燥則火旺肺大枯欲從腎源滋水而不先滋水之母有是理乎然肺為多氣少血之臟故一切血藥概不欲用以羊肺為主諸味之潤者佐之人所易能也若以真粉之甘涼不獨清金且以培土人所未知也愚謂此治上損之主劑也肺熱葉焦之痿飲不解渴之上消並可仿此為法夫可久先生為治損聖手故葉氏治吐血諸證皆宗之奈後人多從醫貫入手不分上損下損惟知六味八味等方而已宜乎其無效也今世所傳葛氏方僅一白鳳膏膾炙人口抑何陋哉燮理十全膏平補陰陽調和氣血人參黃耆各三兩炙白朮六兩熟地八兩歸身白芍川芎各二兩甘草一兩炙上八味熬膏將成入鹿角膠四兩龜板膠三兩收之盛瓷器內窨去火氣每開水調服數錢注此一瓢先生方也其方論云古人治無形之勞倦必培以甘溫人參為君白朮為臣黃耆為佐甘草為使有形之勞倦必助以辛溫歸芎是也資以酸甘芍地是也故以八味為章旨而驅策以血肉之物如鹿之動能通督脈挺走險阻而不疲角戴陽而上升稟乎剛健之用龜之靜能通任脈潛藏固蟄抱陰負陽而善守腹為陰而下降稟乎柔順之體此二膠者各稟一德草木力微賴之而神其用也陰陽兩虛者服之無偏勝無不及或加陳皮半夏以利樞機允為王道之劑凡培養元氣之方宜簡而純簡則臟腑易承氣血易行純則溫厚和平可以補偏救弊俾自相灌注循環無端生生不已以合其先天所賦流行之道若稍有穿鑿非本然之理矣蓋人身之精神不外乎陰陽陰陽又不外乎剛健柔順相倚循環並非分道揚鑣者也故無形之動陽之性即陽之理有形之靜陰之性即陰之理也張之則為陽馳之則為陰陽則剛健中正陰則柔順利貞丹書敬勝怠勝夫人知之無如氣血精力與時推移久勞其陽陽必降而入陰久敝其陰陰必無力承陽必使剛健中正以行之陰柔順利貞以奉於陽則陰陽二氣無形體無疆界不勞不敝則自然清明在躬也露珠丹治殫慮勞神火升心悸震惕不寐遇事善忘透明辰砂一兩以玉器盛露四十九夜除陰雨不算研極細西牛黃一錢研細上二味研勻煉白蜜丸如豌豆大每臨文應事或臥時以一丸噙化正誠丹治同上透明辰砂研極細每砂一兩用生甘草一兩煎湯飛淨去頭底曬乾再研再飛三次為度獖豬心中血絲綿絞去滓凡砂一兩用心血三個每次一個拌砂曬乾再研再拌再曬三個用訖再研極細上以糯米糊和搗萬杵為丸每重七分陰乾得五分瓷瓶密收服法如前神效散治膈消白浮石生蛤粉蟬蛻上三味研細末每三錢鯽魚膽七枚取汁調服注晉三先生云心肺同居膈上熱邪移肺劫其真津而成熇熇之勢熾若燎原故渴而求救於水飲如長鯨之吸川雖補水降火猶恐不及妙在即以水中鹹寒之物從其所欲以治之故仲景用文蛤散潔古化水丹用蛤粉皆同此義是方更有進焉者浮石蛤粉鯽魚膽三者以咸勝苦以苦勝辛辛肺之氣味也佐以蟬蛻輕浮上升引領三者直達肺經解熱上渴且浮石蛤粉之咸皆平善無過非但止渴兼能利水可無聚水之變幻蓋往往有寒涼過用火熱既消反不能消水而成中滿腫脹者吾於此敬服許學士具通天手眼轉展回顧有如此也太乙紫金丹山慈姑川文蛤各二兩紅芽大戟白檀香安息香蘇合油各一兩五錢千金霜一兩雄黃飛淨琥珀各五錢冰片當門子各三錢上十一味各研極細再合研勻濃糯米飲杵丸緑豆大外以飛淨辰砂為衣注此治濕溫疫癘之邪瀰漫熏蒸神明昏亂及霍亂吐瀉痧脹腹痛水土不服嵐障中惡等證兼解諸毒薛一瓢先生云比蘇合丸而無熱較至寶丹而不涼兼太乙丹之解毒備二方之開閉洵為濟生之仙品立八百工之上藥也刊今世所行太乙丹藥品龐雜群集燥熱惟風餐露宿藜藿人寒濕為病者服之頗宜若一概施之誤人匪淺參香八珍膏丹參去頭尾酒洗蒸熟四制香附各四兩熟地炙黃耆白芍酒炒蒸熟白朮白歸身酒炒茯苓各三兩上八味熬膏每三錢開水調服注一瓢先生云此女科調理方之首選也氣味和平功能相稱同行臟腑灌注血脈虛人可以久服愚按氣屬陽欲其剛健血屬陰欲其柔順女子多郁則氣行不健故去甘草之甘緩加香附以承流耆術之宣化鬱則生熱故血行不順爰去川芎之溫竄加丹參以協和三物而涵濡且黃耆得歸芍補血之功敏於人參特舍彼而用此不僅貧富可以共嘗也金鳳銜珠治婦女虛寒諸病致不受孕蛇床子四錢母丁香肉桂杏仁白芨吳萸菟絲子北細辛薏苡仁砂仁牡蠣川椒各三錢麝香少許上十三味各研細再研勻生蜜丸櫻桃大每一丸納玉門中注此治玉門寬濕虛寒帶下或行經腹痛經遲色淡並男子陽虛莖萎遺濁精寒諸證世之男婦患此而隱忍不言遂至仳離甚或釀事蓋不知可以藥治也録方之意殆有深心吉祥丸治婦人血寒氣鬱不能有子天麻煨芎藭桂心丹皮桃花瓣柳絮白朮熟地五味去核茯苓各一兩菟絲子覆盆子楮實各一升桃仁百粒上十四味為末蜜丸豆大每五丸空心苦酒下日三注晉三先生云吉祥者詩言吉夢熊黑男子之祥也婦人血積胞門或寒凝子宮致任脈不榮不能受孕斷緒絶産古人用蕩胞湯秦桂丸等方閨中弱質奚堪猛烈之品是方君以天麻者以其有遊子十二環於外結子透虛入莖中潛生土內復芎藭下行血海治血閉無子東垣言女子肝虛不足宜天麻芎藭以補之也臣以桂心通子宮破瘀桃仁丹皮補肝活血桃花輕薄柳絮顛狂功皆下行走泄其性可以闢除穢惡其情足以感發春心佐以白朮地黃補脾腎之正氣再使以菟絲覆盆五味皆蔓延多子之品茯苓入陽通氣楮買入陰通神俾使內之時精氣神混合一氣自然受孕方之取義甚佳用亦屢效校此二方雖主虛寒無子而一為外治之法一則服藥止五丸何也丹溪先生嘗論之矣謂陽精之施陰血能攝精成其子血成其胞胎孕乃成凡婦人無子率由血少不足以攝精也血少固非一端然必調補陰血使無虧缺乃可成胎何可徑用熱劑煎熬臟腑血氣沸騰經來必轉紫黑漸致衰少始則飲食驟進久則口苦而干病且蜂起焉能受孕縱然生子亦多不壽以熱藥能耗損天真之陰也且婦人血少內熱者多雖膠艾湯不可擅用以艾性至熱入火灸則下行入藥服則上行多服則致毒不可不知然則此二方之外治少服良有深意而中病即止更為用藥者所當知矣刊陳氏云男不能生子有六病精寒也氣衰也痰多也相火盛也精少也氣鬱也女不能受孕有十病胞門冷也脾胃寒也帶脈急也肝氣鬱也痰氣盛也相火旺也腎水虧也任督病也膀胱氣化不行也氣血偏而不能攝精也可見精寒與胞門冷特其一端耳故喻氏謂丈夫無子不可徒服壯陽之藥然則女人不孕豈可概投辛熱之劑耶惟確見虛寒之證者始可用此等方孫真人以五丸為一服何其慎哉後世之神佑丸每服七粒得其旨矣雄謂男女縱無病而兩情未洽亦不能孕情之未洽尤非筆所能罄是二方者不僅治病兼寓洽清此我曾王父所以有取而録之蓋欲人之家室和而似續延故先王父嘆為有深意存焉旨哉言乎安胎飲子懷妊兩月服起至六個月止可免墜胎紅蓮子杵碎台州青苧洗去膠白糯米各三錢上三味水一鍾煎減半每日侵晨服注晉三先生云半産由於房勞傷損足三陰腎傷則精氣不固肝傷則血熱妄行脾傷則胎元自墜紅蓮子清君相之火而能固澀真氣青苧利小水而通子戶清淫欲之瘀熱糯米補益脾陰能實陽明空竅使肝氣不妄動而胎氣自安以五穀果實為方誠王道之劑也蕩胞丸凡屢屢墮胎者墮後即以此丸服七日丹皮桂枝赤芍茯苓桃仁去皮尖上五味等分生研末醋曲糊丸梧子大每朝用紫花益母草三錢煎湯送下二十丸七朝後接用後方玉環丸前丸服至七朝第八朝接服此丸至十四朝而止生地切碎同姜炒去姜丹參去頭尾酒洗炒各四兩全當歸三兩四制大香附赤芍酒炒各二兩川芎童便炒陳艾絨雞子二枚同煮水乾炒黑各一兩上七味研末以黑驢皮膠三兩酒化煬和搗丸梧子大每服二十丸注半産之因不一補虛清火夫人知之惟胞宮留瘀致墮者世罕論及録此二方以補未備方名蕩胞義自顯然但藥非峻烈雖與蕩胞湯同名而純駁緩急大不侔矣神造湯治雙胎經養不周而偏夭不去其死害母失胎此方主之蟹爪一升生甘草二尺阿膠三兩湯成去滓下上三味於東向爐上炊以葦薪煮以東流水一斗取二升頓服或分二服若人昏不能服者灌之即活注晉三先生云神造者制方之妙一若神仙所作者也蟹爪尖專下死胎甘草奠安中氣不使尸氣上乘阿膠滑利前陰分兩用一二三者取數之勝衡以升尺稱者取器之動爐向東者取生氣炊以葦薪者取輕脫若雙胎一死一生者蟹爪又安生胎阿膠專於育神甘草培植生氣服之令死者出生者安真神品也補脬飲治産後脬損小便淋瀝生黃絲絹一尺剪碎白丹皮根木白芨各一錢上三味水一碗煮至絹練如餳空心服咽時不得作聲注晉三先生云脬婦之膀胱也産時為穩婆所傷小水淋漓無度觀其補法有不可思議之妙生絲造者曰絹色黃者入血丹皮連木者入里色白者走氣二者皆能瀉膀胱之火引清氣以達外竅白芨性黏功專收澀能補五內之破損咽之無聲乃有效者蓋聲出於五臟有聲則五臟之氣動而來迎無聲則五臟之氣靜而寧謐所餌之藥不由五臟分布入肺竟從胃口闌門泌別清濁之處由脂膜之絡滲於膀胱之外膜使白芨得以護外而為固也刊二方用藥可謂情義入神而前方煎法此方服法尤足開人之慧悟也青附金丹治婦女癥瘕等病青皮切四兩用消石五錢化水浸香附捶碎四兩童便浸鬱金敲碎二兩用生礬五錢化水浸丹參切三兩薑汁浸上四味研細末醋糊丸麻子大曬乾灑上阿膠水搖令光澤再用人參當歸川芎各一兩白朮茯苓製半夏各二兩陳皮炙草各五錢上八味研細末以米飲泛在光澤小丸上作外廓曬乾每三錢開水下注此薛氏法方制甚奇緣虛弱人而患症痞痃癖有形之病不可徑施攻下故用此為緩消之計其妙在以六君歸芎為外廓使藥入胃時不知有攻消之味而胃氣不傷逮其漸化則對證之藥已至病所俾病去而正不傷誠女科之要方也刊婦女經産皆以血為用故其體多虛而受制於人故其氣多郁氣鬱則痰易凝而血易滯此症癥等病所由成也粗工率用峻劑但可以治實證庸流偏於養正每致延為痼疾觀此方以六君歸芎先為保護中氣已寓化痰養血之治可謂所至秋毫無犯而暗伏奇兵拔其負固安良除暴允為王者之師喻氏論治下焦寒疝義本於止豈非善得師哉雄謂以此類推凡治下焦病皆宜仿此法庶無諺所云兵馬過籬笆破之弊也五香丸治同上五靈脂一斤香附去淨毛一斤水浸一日黑牽牛白牽牛各取頭末二兩上四味於未研之先一半微火炒熟一半生用共研細末和勻醋糊丸蘆蔔子大每七八分或一錢臨臥薑湯下次早再一服即愈孕婦忌服小兒減半虛人慎用注五靈脂破瘀安新香附調氣舒郁牽牛開結行痰逐飲通水合為消癥散癖之方不為不峻然每服錢許用治實證尚為善藥即痰積食積氣滯成瘕蠱膈腫脹實痢初起審屬痞聚在腹有形攻痛之證皆可治之虛人或以六君子加歸芍作煎劑送服亦可導症囊治血因寒阻凝結成症川椒皂角各一兩細辛一兩五錢上三味為末以三角囊大如指者長二寸盛藥納入陰戶內欲便則出之便已再納症化惡血而下以溫湯洗之三日勿近男子注外治法藥雖峻似不比內服者之慮其耗傷元氣也然藥皆辛熱必確因寒阻血凝為病者始為對證觀症化惡血而下句義自顯然矣保嬰湯治小兒諸病陳米黃土嫩竹葉蘆蔔子薄荷葉燈草心麥蘖上七味隨證所主者多用其餘次之每服不過三錢袋盛煮湯任意渴飲如便燥者調入白蜜少許注小兒之病多起於乳食不節此湯調養脾胃巳扼幼科之要故可隨證損益以應諸病若夏月泄瀉尤為妙方即痘疹後調理亦宜准此不可以平淡忽之而從事溫補致釀別恙也刊小兒以脾胃為後天根本乳食不節脾胃有傷漸難運化吐瀉乃作久則脾土虛弱肝木乘之糞色漸青面部萎白帶青手足微搐無力神氣懨懨不振而慢脾成矣江筆花醫鏡云時俗所謂慢驚風即木侮土是也初起宜異功散甚者加木香肉桂若肢冷唇白息微元氣欲脫也急用附子理中湯尚可挽回然變之速者用藥稍緩即不濟事未可概視為慢也雄按莊氏福幼編專論此證若果系此證應用此藥乃謂執一方而可通治泄瀉其禍可勝言哉天一丸治小兒百病燈草心十斤以米粉漿染曬乾研末入水澄之浮者為燈心取出又曬乾入藥用二兩五錢而沉者為米粉不用矣赤白茯苓去皮兼用茯神去木五兩滑石水飛過五兩豬苓去皮二兩澤瀉去蘆三兩上五味各為細末以潞黨參熬膏和丸龍眼大辰砂為衣飛金為裹每一丸隨證用引調服注韓天爵云小兒生理向上本天一生水之妙故治病以小水通利為捷徑也愚謂小水通利則病有去路故曰捷徑諺云溲多無病矢多無命即此義也清驚散治小兒痙厥瘛瘲陳膽星九分飛辰砂一分上二味研細以竹瀝半小杯生薑汁一小匙和勻再用麥冬一錢橘紅八分薄荷尖一分煎湯調服注俗傳急驚風方中行喻嘉言兩先生闢之甚詳此方以降痰清熱息風為治得其指矣刊醫鏡云俗云急驚風痰火閉也小兒或感風寒或積乳食皆能生痰痰積則化火或受暑熱亦生火失於清解則火升而痰亦升痰火上壅閉其肺竅則諸竅皆閉其證目直氣喘昏悶不醒且火甚則肝燥筋急為搐搦掣顫反張竄視而八候生焉總由痰火閉結肝風內動而成非嚇驚也當其拘攣弓仰之時不可用力緊抱但以手扶聽其自抽自止庶不傷經絡而成廢人初起宜通關散開其嚏得嚏則醒次以竹瀝或梨汁蘆蔔汁和入石菖蒲汁灌之火降痰平則病自己愈後宜清熱養陰勿投溫補雄按痰古作淡顯系二火搏水以成痰也萬密齊嘗云人之有痰猶木之有津時令大熱草木流津痰自熱生此明驗也痰猶水也附氣自行過顙在山豈水之性哉乃搏激使之也故雄謂胃火盛則飲食生痰痰愈盛則肥濃愈嗜者是也肝火熾則津液凝痰痰愈盛則筋絡愈燥者是也痰因火動理自不誣順流丹治痘證險逆當歸川芎升麻甘草各六兩上四味銼粗末於臘月八日取東流清水七大碗煎至三大碗去渣將藥盛新砂鍋內再選明淨完體辰砂四兩上砂盛細絹袋內以線扎口懸系藥汁中約離鍋底一指以桑柴慢火煮至汁盡取起研細末瓷瓶收藏另用好糯米半升淘淨控乾水氣再以鹽滷和淨黃土乾濕得所包米為團放炭火內煅令通紅速即取出冷定劈開揀米粒色黃有性者亦研細末別盛瓷瓶收藏凡小兒一歲足者用辰砂末米末各一分白蜜一茶匙米湯半杯醇酒三匙共二未調勻以茶匙徐徐喂服未出痘者免出已見點者必稀陷沒者片時即起合藥一料施送可救數百人惟合時須焚香淨室吉人勿令雞犬陰宦孝服殘疾穢病人見慎之珍之注古愚消夏録載此方云真定梁氏世施此藥厥功甚著而用藥平淡製法甚奇名之曰順流丹蓋以水向東流為順用治逆痘證即轉順夫致膠煎以伏流之阿水則名阿膠亦為其功在水耳故煎藥之水不可不因證而擇其宜也第東流水既取其順趨亦取其流行煎藥者宜取而即用不可久停以失流行之性觀其不用井水止水意可見矣校上論方劑六月初一日取好水藏之久而彌佳名六一水又名神仙水宜於夏秋烹茗何氏醫碥煎藥用水歌云急流性速堪通便宣吐回瀾水最宜百沸氣騰能取汗甘瀾勞水意同之黃齏水吐痰和食霍亂陰陽水可醫新汲無根皆取井除煩去熱補陰施地漿解毒兼清暑臘雪寒冰療疫奇更有輕靈氣化水奇功千古少人知堪調升降充津液滋水清金更益脾刊雨雪之水名曰天泉即半天河水一名上池水其質最輕其味最淡宜煎清肅上焦藥淪茗遠勝山泉惟吾杭飲之故人文秀美甲於天下杭城皆瓦屋以竹木或磚或銅錫為承霤引其水而注之缸然必日使人梯而上視如有鳥惡貓穢之瓦即以潔瓦易之再以淨帚頻為掃除毋使木葉塵砂之積則水始清若近廚突之屋必有煤炲之汙勿取其水也狂風驟雨之水必夾塵砂亦勿取焉久晴乍雨之水亦勿遽取恐瓦有積垢翟之未淨也既注之缸必待其澄而後挹其清者藏諸別缸藏久彌良凡藏水之缸宜身長而口小者上以缶盆冪之而置於有風無日之所日曬久則水易耗而色不白也置缸之地須甃以石俾免濕氣上蒸也嚴寒之際缸慮凍裂每缸內入以粗松柴三四尺即不泐先慈嗜茗而取水甚嚴蓄水甚精謹詳識之雖他處亦可仿行以免水土惡劣之病不但備烹茶煮藥之用已又凡溪澗之水惡劣者其山必嶮巇或為砒礬毒藥之所産或為蟲蛇猛獸之所居而人之飲食首重於水乍入其鄉者飲之疾病生焉生於其地者習之狠戾鍾焉欲籌斡旋補救之策以期革獷悍之俗而康濟斯民者惟有深鑿井泉是為亟務爰附泰西掘井法於下庶無井之處悉可廣鑿焉高地作井未審泉源所在其求之之法有四第一氣試當夜水氣恆上騰日出即止今欲知此地水脈安在宜掘一地窖於天明辨色時人入窖以目切地望地面有氣如煙騰騰上出者水氣也氣所出處水脈在其下第二盤試望氣之法曠野則可城邑之中室居之側氣不可見宜掘地深三尺廣長任意用銅錫盤一具清油微微遍擦之窖底用木高一二寸以搘盤偃置之盤上乾草蓋之草上土蓋之越一日開視盤底有水欲滴者其下則泉也第三缶試近陶家之處取瓶缶坯子一具如前銅盤法用之水氣沁入瓶缶者其下泉也無陶之處以土甓代之或用羊絨代之羊絨者不受濕得水氣必足見也第四火試掘地如前篝火其底煙氣上升婉蜒曲折者是水氣所滯其下則泉也煙氣直上者否鑿井之法有五第一擇地山麓為上蒙泉所出陰陽適宜園林室屋所在向陽之地次之曠野又次之山腰者居陽則太熱居陰則太寒為下鑿井者察泉水之有無斟酌避就之第二量淺深井與江河地脈通貫其水淺深尺度必等今問鑿井應深幾何宜度天時旱潦河水所至酌量加深幾何而為之度去江河遠者不論第三避震氣地中之脈條理相通有氣伏行焉強而密理中人者九竅俱塞迷悶而死凡山鄉高亢之地多有之澤國鮮焉此地震之所由也故曰震氣凡鑿井遇此覺有氣颯颯侵人急起避之俟泄盡更下鑿之欲候知氣盡者縋燈火下視之火不滅是氣盡也第四察泉脈凡掘井及泉視水所來而辨其土色若赤埴土其水味惡赤埴黏土也中為甓為瓦者是若散沙土水味稍淡若黑墳土其水良黑墳者其土色黑稍黏也若沙中帶細石子者其水最良第五澄水凡作井底用木為下磚次之石次之鉛為上既作底更加細石子厚一二尺能令水清而味美試水美惡辨水高下其法有五凡江河井泉雨雪之水試法皆同第一煮試取清水置淨器煮熟傾入白瓷器中候澄清下有沙土者此水質濁也水之良者無滓又水之良者以煮物則易熟第二日試清水置白瓷器中向日下令日光正射水視日光中若有塵埃氤氳如遊氣者此水質不淨也水之良者其澄徹底第三味試水元行也元行無味無味者真水凡味皆從外合之故試水以淡為主味佳者次之味惡為下第四稱試有各種水欲辨優劣以一器更酌而衡之輕者為上第五紙帛試用紙或絹帛之類色瑩白者以水蘸而干之無痕跡者為上又按人可以一日無谷不可以一日無水水之於人顧不重歟苟知掘井試水之法則在在可飲甘泉且藉以備旱災救火患一舉而數善存焉雄性喜鑿井奈無其力惟冀同志者匡余未逮為幸但井欄之口宜小庶免墜溺之虞尤為切要設無水之地而不能鑿井者更有水庫一法泰西書云若天府金城居高深險江河溪澗境絶路殊鑿井百尋盈車載綆時逢亢旱涓滴如珠或絶徼孤懸恆須遠汲長圍久困人馬乏竭如此之類世多有之臨渴為謀豈有及哉計惟恆儲雨雪之水可以御窮而人情狃近未或先慮及其已至坐槁而已亦有依山掘地造作塘池以為旱備而彌月不雨已成龜坼徒傷浥注之易窮不悟滲漏之實多也西方諸國因山為城者其人積水有如積穀谷防紅腐水防漏泄其為計慮亦略同之以故作為水庫率令家有三年之蓄雖有大旱遇強敵莫我難焉且上方之水比於地中陳久之水方於新汲其蠲煩去疾益人利物往往勝之彼山城之人遇江河泉井之水猶鄙不屑嘗矣名曰水庫者固之其下使無受泄也冪之其上使無受損也四行之性土為至干甚於火矣水居地中風過損焉日過損焉夏之日大旱金石流土山焦而水獨存乎故固之故冪之水庫之事有九一曰具具者庀其物也二曰劑劑所以為之和也三曰鑿鑿所以為之容也四曰築築所以為之地也五曰塗塗所以為之固也六曰蓋蓋所以為之冪也七曰注注所以為之積也八曰挹挹所以受其用也九曰修修所以為之彌縫其闕也
