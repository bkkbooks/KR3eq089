body:
  text: 卷下藥字從草故神農辨藥之書曰本草經則本草宜以草部居先草類甚多孔子曰蘭為王者之香則蘭之於草亦猶麒麟之於走獸鳳凰之於飛鳥後之修本草者苟折衷於聖人自當以蘭為冠矣蘭以素心者為貴舒思慮之鬱結蠲蘊伏之濁邪稀痘催生清神養液稟天地至清之氣而生故昔人有吹氣如蘭之喻曉嵐先生筆記云苗峒地界值蘭開時有食蘭蕊之蟲形似蜈蚣而色青取置杯中灑以鹽末少許覆之以蓋須臾化為水湛然淨綠澈如琉璃蘭氣撲鼻用以代醯香沁齒頰半日後尚留餘味然蘭謝時即死殊不易得彼地亦甚珍也惜不知其何名愚謂此蟲可與脈望鞠通相鼎立洵稱仙品宜其不易得也夫蟲而食蘭猶得仙致施之於人效自可知乃有以省頭草當之者抑何陋耶刊潮州蔗田接壤食蔗之蟲形如蠶蛹而小味極甘美性涼解熱毒助痘漿可與蘭蟲並傳古之權量既小而藥劑甚輕每服數錢者居多今世反是故藥價漸貴所以患病愈難矣不但良醫罕出也如人參一味竟為富貴人常饌夫人參亦草根耳天之生此原以療人之病非以養人之生因無病之人競相購服而視為養生之物無怪乎其價之日昂也其價既昂偽物日多而病之果當用此者遂不能用矣豈非以有用之才銷磨於無用之地而需才之時反無才用乎其實古之人參微涼微苦與近時西洋參性味略同深明醫理者似可通融代用不必刻舟求劍而默贊參價之昂擅破貧人之產也如證屬大虛西洋參嫌其力薄不妨以黃耆甘草枸杞子龍眼肉之類隨宜匡佐亦在善用者驅策得其道爾此外更有習俗相沿而不知其誤者略論如上枸杞子味純甘色大赤其質潤其性平聖濟以一味治短氣余謂其專補心血非他藥所能及也與元參甘草同用名坎離丹可以交通心腎肉蓯蓉溫潤潛陽陰虛陽浮者滋清藥中皆可佐用石菖蒲舒心氣暢心神怡心情益心志妙藥也而世俗有散心之說不知創自何人審是則周文王嗜此何以多男而壽考耶故清解藥用之賴以袪痰穢之濁而衛宮城滋養藥用之藉以宣心思之結而通神明本經淫羊藿氣寒味辛無毒主陰痿絕傷莖中痛利小便益氣力強志後人因別錄羊食而淫之說遂改為性熱助陽誤矣夫羊性喜淫乃其天賦不必食此藿也即謂食之益淫故以命名然人非羊也食之何必淫吾鄉畜羊者秋冬以桑葉飼之故羊之益人惟杭嘉湖者為最然桑葉者蠶食之而成絲之物也若謂人食淫羊之藿而亦淫則羊食成絲之桑而亦絲矣蓋體臟既殊不能以一例論也如礬石之為物也蠶食之肥鼠食之死可見藥有定性而體臟不同則性亦隨之而變矣余謂羊為火畜藿稟水氣羊果食藿而益淫亦內經陰平陽秘之旨耳惟葉氏云淫羊藿氣寒稟天冬令之水氣入足少陰腎經味辛無毒得地潤澤之金味入手太陰肺經氣味降多於升陰也陰者宗筋也水不制火火熱則筋失其剛性也而痿矣淫羊藿入腎而氣寒寒足以制火而痿自愈也絕傷者陰絕而精傷也氣寒益水味辛能潤潤則陰精充也莖玉莖也痛者火鬱於中也熱者清之以寒郁者散之以辛所以主莖中痛也小便氣化乃出辛寒之品清肅肺氣故利小便肺主氣腎統氣寒益腎辛潤肺故益氣力也氣力既益內養剛大所以強志蓋腎藏志也此解真得其要者故錄之以釋諸家之惑且腎主骨陰虛骨痿者亦為要藥經云腎苦燥急食辛以潤之正指此也刊鄒氏本經續疏亦詳辨淫羊藿性不助陽與解要合體臟之殊不但人物迥別即人與人亦有大不同者居易錄云江南蕭某食香蕈則死又有王生者飲茶則死必二三日始蘇醫無能識其故者雄嘗見黟人汪振聲食鱉則醉仁和趙子循茂才飲蔗漿輒衄定州楊素園大令啖海參必發熱須以大黃瀉之而安皆不可以恆理測也食物且然而況於藥平用藥者可不知藥有定性氣隨人異之說而先辨別其臟性乎沙參清肺蓋肺屬金而畏火清火保金故曰補肺肺主一身之氣肺氣清則治節有權諸臟皆資其灌溉故曰補五臟之陰肺氣肅則下行自順氣化咸藉以承宣故清肺藥皆通小水喻氏謂有肺者有溺無肺者無溺可云勘破機關注六腑氣化必稟司臟真昔人治肺氣不化膀胱為熱邪所滯而小溲不通少腹與睪丸脹痛者一味沙參大劑煎服覆杯而愈是肺氣化而小溲通也後人不曰沙參可通溲閉乃謂沙參可治疝氣誤矣黃履素見一味蘆菔子通小便詫以為奇蓋不知蘆菔子亦下氣最速之物服之即通者病由氣閉也故勘病必察其所以致病之由則用藥自臻神化而無執死藥以療活病之弊矣桔梗開肺氣之結宣心氣之郁上焦藥也肺氣開則府氣通故亦治腹痛下利昔人謂其升中有降者是矣然畢竟升藥病屬上焦實證而下焦無病者固可用也若下焦陰虛而浮火易動者即當慎之其病雖見於上焦而來源於下焦者尤為禁劑昔人舟楫之說最易誤人夫氣味輕清之藥皆治上焦載以舟楫已覺多事質重味厚之藥皆治下焦載以上行更屬無謂故不但下焦病不可用即上焦病亦惟邪痹於肺氣鬱於心結在陽分者始可用之如咽喉痰嗽等證惟風寒外閉者宜之不但陰虛內傷為禁藥即火毒上升之宜清降者亦不可用也柴胡為正傷寒要藥不可以概治溫熱諸感為少陽瘧主藥不可以概治他經諸瘧為婦科妙藥不可概治陰虛陽越之體用者審之刊趙菊齋先生云乾隆間先慈隨侍外祖於番禹署時患證甚劇得遇夷醫治愈因囑曰此肝陰不足之體一生不可服柴胡也後先慈年逾五旬兩目失明肝陰不足信然繼患外感醫投柴胡數分下咽後即兩脅脹痛巔頂之熱如一輪烈日當空亟以潤藥頻溉得大解而始安善乎本經疏證之言曰柴胡為用必陰氣不紓致陽氣不達者乃為恰對若陰已虛者陽方無依而欲越更用升陽是速其斃矣故凡元氣下脫虛火上炎及陰虛發熱不因血凝氣阻為寒熱者近此正如砒鴆也白芨最黏大能補肺可為上損善後之藥如火熱未清者不可早用以其性澀恐留邪也惟味太苦宜用甘味為佐甘則能戀膈又宜噙化使其徐徐潤入喉下則功效更敏其法以白芨生研細末白蜜丸龍眼大臨臥噙口中或同生甘草為細末甘梨汁為丸亦可若痰多咳嗽久不愈者加白前同研末蜜丸噙化真仙方也刊癸巳類稿謂吸亞片成㾬者專傷於肺用白芨末和梨汁為膏服可愈近人載入洗冤錄實不盡然以肺主出氣腎主納氣而論亞片煙之呼吸似無不關於肺者果系肺受灼爍而津液先損於上此方卻宜然吸菸久而成病者皆先損於下而為下虛上買之證以火搏其液而煙性升提痰涎易壅於上也抑王勳臣所謂呼吸由氣管而入氣府並不由於肺乎按說文㾬瘢也廣韻杖痕腫也今人呼病久破䐃為㾬瘡是也不可附會於煙引煙之稱曰引者言其既吸之後欲罷不能必引之致死而後已故謂之煙引俗作癮者以其音同也然已失引之木義矣豈可妄意穿鑿謂吸亞片者必生瘡於肺哉丹參降而行血血熱而滯者宜之故為調經產後要藥設經早或無血經停及血少不能養胎而胎不安與產後血已暢行者皆不可惑於功兼四物之說並以其有參之名而濫用之即使功同四物則四物湯原治血分受病之藥並非補血之方石頑先生已辨之矣至補心之說亦非如枸杞龍眼真能補心之虛者以心藏神而主血心火太動則神不安丹參清血中之火故能安神定志神志安則心得其益矣凡溫熱之邪傳入營分者則用之亦此義也若邪在氣分而誤用則反引邪入營不可不慎注行血宜全用入心宜去梢用知母苦寒清肺胃氣分之熱熱去則津液不耗而陰自潛滋暗長矣然仲聖云胃氣生熱其陽則絕蓋胃熱太盛則陰不足以和陽津液漸干而成枯燥不能殺穀之病其陽則絕者即津液涸竭也清其熱俾陽不絕則救津液之藥雖謂之補陽也可乃後人以為寒涼之品非胃家所喜諄諄戒勿輕用輒從事於香燥溫補之藥者何哉此議藥不議病之世界所以致慨於喻氏也白微涼降清血熱為女科要藥溫熱證邪入血分者亦宜用之何今世不用於女科而視為升散藥不問邪之在氣在血往往亂投誤人不淺不學無術此其最也芍藥之味本經苦別錄加以酸字酸苦湧泄為陰是開泄之品耳觀仲聖云太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以胃氣弱易動故也故滯下為病乃欲下而窒滯不通者以此為主藥也今人誤為酸斂用以治虛瀉殊欠考也惟土受木乘而瀉者用之頗宜刊鄒氏疏證云芍藥開陰結大黃開陽結故腸中燥結則用承氣腹中滿痛多用勺藥若心下滿痛病在上焦之陽結則當用陷胸而芍藥在所忌矣丹皮雖非熱藥而氣香味辛為血中氣藥專於行血破瘀故能墮胎消癖所謂能止血者瘀去則新血自安非丹皮真能止血也血虛而感風寒者可用以發汗若無瘀而血熱妄行及血虛而無外感者皆不可用惟入於養陰劑中則陰藥藉以宣行而不滯並可收其涼血之功故陰虛人熱入血分而患赤痢者最為妙品然氣香而濁極易作嘔胃弱者服之即吐諸家本草皆未言及用者審之麥冬本經所主皆是胃病崇原發明最詳其功在心不可去之善用麥冬者其惟香岩先生乎刊繆氏經疏知麥冬為胃經正藥寓意草始言脾胃異治葉氏大暢厥旨謂胃為陽土宜用甘涼俾後人得所遵循故洄溪潤安皆深折服也益母草專走血分婦人以血為用故有益母之名非謂不治男子之病也凡濕熱之邪入於血分或血熱血瘀為病皆可治之今人但入女科固矣夏枯草微辛而甘故散結之中兼有和陽養陰之功失血後不寐者服之即寐其性可見矣陳久者其味尤甘入藥為勝本經草蒿即今之青蒿以莖紫者良專解濕熱而氣芳香故為濕溫疫癘妙藥又清肝膽血分之伏熱故為女子淋帶小兒癇痙疳䘌神劑本草未言特為發之惟味甚苦胃氣虛弱者須迴護也旋覆花今人但用以降逆而本經云補中下氣何也蓋升降之權在於中氣氣之不應升而升者謂之逆反逆為順謂之下其能反逆為順者則賴中樞之旋轉能使中樞旋轉詎非補中之力乎觀其色可知矣余謂旋者轉旋中氣之能復者氣下為順之象命名之義以此刊近閱鄒氏疏證引群芳譜言旋覆花梢頭露滴入土中即生新根可見其生機之旋相升降矣表之曰補中下氣乃聖人體物入微處薛一瓢案中亦云旋覆有斡旋中氣之能與吾曾王父之論合世人謂其瀉氣不敢施於虛體豈不悖哉何首烏內調氣血外散瘡癰功近當歸亦是血中氣藥第當歸香竄主血分風寒之病首烏不香主血分風熱之疾為異耳故同為婦科瘡科要藥並治虛瘧並滑大腸無甚滋補之力昔人謂可代熟地實未然也訒庵先生謂熟地首烏皆是君藥方中不可同用尤屬笑談夫藥之孰為君孰為臣當隨證制方而後定其任見是證用是藥即為君藥明乎此則本草所載孰不可以為君書曰任官惟賢材是治世之賢不以資格門第論也草木金石諸品皆謂之藥材是治病之藥不以貴賤純駁論也良醫良相同功亦惟識其材而任之當耳所謂醫道通於治道也栝蔞根一名天花粉性涼味甘故能生津止渴而化燥痰仲聖明言渴者去半夏加栝蔞根是半夏化濕痰花粉化燥痰之的據也後人順口讀過不悟其意而以貝母與半夏為對待殊不切貼栝蔞實一名天瓜故其根名天瓜粉後世訛瓜為花然相傳已久不可改矣栝蔞實潤燥開結蕩熱滌痰夫人知之而不知其舒肝鬱潤肝燥平肝逆緩肝急之功有獨擅也玉橫先生言之最詳今藥肆中名此為栝蔞以土瓜根子為栝蔞用者不可不審土瓜一名王瓜即月令孟夏王瓜生是也非蔬圃之黃瓜蔬圃黃瓜一名胡瓜隨園食單作王瓜者誤也金銀花李士材已表其治痢治脹之功而不知尚有清絡中風火濕熱解溫疫穢惡濁邪息肝膽浮越風陽治痙厥癲癇諸證也木通味苦故瀉心火由小腸出諸本草皆云甘淡或言微辛豈諸公不但未經口嘗且芻蕘亦未詢乎葛根風藥也風藥皆燥古人言其生津止渴者生乃升字之訛也以風藥性主上行能升舉下陷之清陽清陽上升則陰氣隨之而起津騰液達渴自止矣設非清陽下陷而火炎津耗之渴誤服此藥則火藉風威燎原莫遏即非陰虛火炎之證凡胃津不足而渴者亦當忌之刊林北海重刻張司農治暑全書序云柴胡劫肝陰葛根竭胃汁二語可謂開千古之群蒙也葉氏幼科要略曾引及之而洄溪評為杜撰雄謂言而中理雖杜撰何妨固哉徐子之評書也茜草根曉嵐先生云能解巴蠟蟲毒以此推之似可治蛇蠍毒蟲諸螫澤瀉有聰耳明目之功人皆疑之理虛元鑑謂究其命名之義蓋澤者澤其不足之水瀉者瀉其有餘之火不若豬苓木通之直走無餘不可視為消陰損腎之品也刊理虛元鑑論證最精論藥次之立方則不佳黃柏之功昔人已詳之矣或竟視為毒藥痛戒勿用毋乃議藥不議病之陋習耶經言腎欲堅急食苦以堅之凡下部不堅之病多矣如莖痿遺濁帶漏痿躄便血瀉痢諸證今人不察病情但從虛寒治之而不知大半屬於虛熱也蓋下焦多濕始因陰虛火盛而濕漸化熱繼則濕熱阻夫氣化反耗精液遂成不堅之病皆黃柏之專司也去其蝕陰之病正是保全生氣誰謂苦寒無益於生氣哉蓋黃柏治下焦濕熱諸證正與蛇床子治下焦寒濕諸證為對待槐實味苦色黃清肝膽而涼血清肝涼血之品類可安胎獨槐實既不能安胎而反墮胎者何也則本經主子藏急痛一言已括其義矣子藏即胎宮屬任脈為受精之所急痛者因交合不節所致槐實專通任脈直達子宮能滌射入之精而瀉淫欲之火故孕婦用之其胎即墮推之黴瘡便毒利西泰謂發於外腎橫骨上亦穢毒入於任脈之病景岳全書有一味槐蕊之方不知傳自何人余服其妙竹類甚多其名不一但驗其節起雙線者皆可入藥以壯嫩者為良若節間單線者名毛竹所謂刮腸蓖者即毛竹之筍也其籜有毛故名毛竹勿入藥用凡種竹向西北其根無不向東南行者盧氏謂其稟木火之氣信矣然既傲雪凌霜亦能忘炎敵暑四時不改其操性極平和號為君子且植物之本無不由小而漸大惟竹出土之後雖干青雲而直上能不改其本體之恆故節字從竹表其無毫髮之放溢也其皮最韌而緊名之曰筠塞舟不漏以鮮者入藥曰茹清五志之火祛穢濁之邪調氣養營可塞血竇胎前產後無所不宜葉則內息肝膽之風外清溫暑之熱故有安神止痙之功瀝則其液也故能補血養經絡達四肢而起廢疾凡病人久不理髮結而難梳者用竹瀝少加麻油和勻潤之即可梳通故一切憂思鬱結之病無不治之世人但用以開痰結陋矣黑棗肉腴味厚紅棗色赤氣香均以大而堅者為良入藥各有所宜隨證分別而用可也南棗香味皆遜於北棗徒以形貌取悅於人者宜供食品入藥力薄備要之言不可從也梨亦以北產者良南產以義烏之插花梨為最徽州雪梨皮色甚佳而味帶酸不可入藥蓋梨不論形色總以心小肉細嚼之無渣而味純甘者為佳凡丹石煙火煤火酒毒一切熱藥為患者啖之立解溫熱燥病及陰虛火熾津液燔涸者搗汁飲之立效此果中之甘露子藥中之聖醍醐也瀕湖發明詳著其功矣校甘露子蕉實也生津解渴潤燥除煩更勝於梨乃果中之仙品惜不易結耳鮮柿以熟透不生核者良味甘性寒養肺胃之陰宜於火燥津枯之體脾氣虛寒者啖之即瀉乾柿以北產無核者良本草已載其功而滋補脾胃最宜於小兒凡小兒忌食香燥乾硬等物以疳者干也又疳字從甘弗食甘酸果品雜物惟柿樹不生蠹故小兒初進穀食宜用乾柿飯上蒸熟嚼飯喂之自無疳蟲脹瀉諸病此古人所未言也木瓜一味為末治黴瘡結毒惟解要載此方枇杷葉毛多質勁味苦氣涼隆冬不調盛夏不萎稟激濁揚清之性抱忘炎耐冷之姿靜而能宣凡風溫溫熱暑燥諸邪在肺者皆可用以保柔金而肅治節香而不燥凡濕溫疫癘穢毒之邪在胃者皆可用以澄濁氣而廓中州本草但云其下氣治嗽啘則偉績未彰故發明之刊香岩先生嘗云天氣鬱勃泛潮宜以枇杷葉拭去毛淨鍋炒香泡湯常飲清香不燥能闢穢濁可免夏秋時令之病與此暗合龍眼肉味純甘而溫大補血液蒸透者良然濕盛者能生痰脾弱者滑大便不可不知也其核研敷金瘡磕跌諸傷立即止血止痛愈後無瘢名驪珠散真妙藥也其殼研細治湯火傷亦佳若焚之可闢蛇皆有用之物凡啖龍眼者何可輕棄耶藕以仁和產者為良熬濃汁服既能補血亦能通氣故無膩滯之偏蓮子交心腎不可去心然能滯氣單用心則大降心火荷葉燒飯大升脾氣以荷葉屬震震為木土得木而達也燒飯者以荷葉同米煮為飯也杭州呼煮飯曰燒飯是矣謬者解為荷葉包飯於火中燒之不通甚矣蒲桃以北產者良吐爾番出者純甘無核尤勝大補肝脾之血與枸杞子同功胎上衝心單用蒲桃一兩煎服立愈甘蔗以青皮者良名竹蔗台州所產長大如竹甘涼清熱充津俞文起先生云一名接腸草昔有腸斷者頻飲此汁而愈蘆菔能制面毒故一名來服言來麰之所服也俗作萊菔蘿蔔失其旨矣種類甚多厥功甚大生用能解風火溫燥濕熱之邪故煙毒煤毒酒毒火毒失音痰閉中風咽喉諸病無不立奏神效熟用補脾肺和腸胃耐風寒肥健人可以代糧救荒誠蔬圃中之一路福星也本草既沒其豐功更誣以耗滲豈不冤哉然薄海蕃滋鄉人廣種以充糧食終身啖之而康強壽考且有垂老而發不白者此人所共睹之事何以修本草者獨貿貿也校本草言茄子最不益人女人食之傷子宮而內君獨嗜之雖有娠亦不忌然生育頗易可見穀肉果菜皆是養人之物不必講求服食饕餮肥甘也冬瓜以杭州搭棚而種使其懸生棚內既遮日曬又不著地味純甘而不帶酸者良涼而潤肺甘能養胃極清暑濕止煩渴利二便消脹滿治暑濕霍亂瀉痢有殊功子潤肺化濁痰皮解風熱消浮腫蔬圃中妙品也食茱萸即古人重九登高所佩者種類不一俗名辣椒辣茄辣虎稱謂亦不一也味極辛性大熱少食能疏風秘故世人誤以為性涼而陰受其禍者多矣凡陰虛血熱之人切不可食糯米可釀酒甘酒之人日多釀酒之家日眾種糯之田日廣則種粳之田日奪而米價日增矣民無蓋藏豈非大病醫國之工可不為之計乎刊米價日貴固病國病民之大故也今則銀價日昂漏卮莫塞其病益劇矣醫國之工尤當早為之計也粳米為養人之至寶而荒歉時有不可不豫籌積儲之法也最簡易者但將飯干曬透永遠不壞飢者嚼一撮得米氣便可不死每年各家留飯一斗曬透入甕存放乾燥處甚不費力貧富皆可為之若得家家如此遠勝積穀備荒多矣注以糯米一斗淘淨百蒸百曬搗細入甕存乾燥處亦不壞日服三勺渴則飲之鬥米可度一月家有老人不能嚼飯乾者不可不知此法故補錄之蠶豆實於蠶時故名一名佛豆佛誕可薦新也補中益氣小兒禁食恐難化也龍喜取之故開花遇雷電則不結實海船內有蠶豆一粒即不能出洋龍欲取之也航海者不可不知石膏余師愚以為治疫主藥而吳又可專用大黃謂石膏不可用何也蓋師愚所論者暑熱為病暑為天氣即仲聖所謂清邪中上之疫也又可所論者濕溫為病濕為地氣即仲聖所云濁邪中下之疫也清邪乃無形之燥火故宜清而不宜下濁邪乃有形之濕穢故宜下而不宜清二公皆卓識可為治疫兩大法門故學醫不比學詩文之可專尚一家如詩法三唐文宗兩漢已可橫絕一時醫必博覽諸書而知所取捨不為古人所欺庶能隨證用藥而不誤世也校林觀子先生云陶節庵之於傷寒其所窺者止大綱粗跡而非窮神極變之精微故王金壇謂其聾瞽後學為仲聖之罪人非過論也奈今之治傷寒者率守陶氏一家之書以為軌則可不嘆哉又王予中太史白田集論陶氏以傷寒與溫暑諸證解表不同而治里則同為大不然且謂承氣白虎豈可以治溫暑噫太史雖深究理學實未知醫學何必發此議論以誤後人耶深恐世之讀其書者信其學問而並信其醫故附及之刊蕭山郁龍士瑤史載楊天安云杭州李車兒後裔仁山先生真痘科大作手一火痘悶證用石膏斤半熬湯煎黃連五錢為劑發猶未透為加金汁一盞始愈以金汁乃濁陰可治亢陽也雄按此深得費氏之法者痘證挾疫豈不信然鹽味最咸泰西水法云辛甘酸苦皆寄草木獨咸寄於海水而海水不冰者海水咸也故曰咸者生於火也火燃薪木既已成灰用水淋灌即成灰滷燥干之極遇水即咸此其驗也愚謂惟其屬火故生物遇之即死蓋體潤而用燥之物也古人但云咸能軟堅咸能潤燥而不知咸能堅軟咸能燥濕試觀一切易腐之物得鹽醃之即堅干而可經久凡鹽倉工作之人從無患腳氣者以其日踐踏於鹽地故濕氣不能病也然燥物遇咸則潤故鹽能爛鐵是軟堅也濕物遇咸則燥故鹽能幹液而堅軟也味過咸即渴者干液之徵也既能幹液則鹽味屬火無疑燥濕堅軟固其宜矣但味雖屬火而性下行虛火上炎者飲淡鹽湯即降故為引火歸元之妙品吐衄不止者鹽滷浸足立愈豕腦多食能痿陽何也蓋坎為豕在地支則屬亥水畜也水性最弱而腦者其一身之主腦也故能柔物可以熟皮久食之不僅陽痿云有患軟癱者惟為木畜故肉最多而無筋腎極盛而多子性喜卑濕穢食偏肥能化穢食為肥脂者非其脾運之獨健乃其胰獨大於他獸也胰主消化食物大而厚力故能變朽腐為神奇觀染家用以洗絹帛則黑者可白人用以為面脂則黎者可澤若蒸熟食之可以助消化滌濁痰故婦人子宮脂滿不受孕及交合不節而子宮不淨此能走任脈清子官且血肉之品無克伐之慮最為妙藥若孕婦食之則蠲胎垢其兒出痘必稀牛乳滋潤補液宜於血少無痰之證惟性溫而膩若有痰火者反能助痰滯膈而增病也用者察之人乳亦然諸滋膩藥無不然也驢皮煎膠而用阿井水者取濟水之伏流也其不名驢皮膠而名阿膠乃功歸至靜之水以制浮動之火故能愈血證夫水尚欲其伏流顧可以火炒而用乎以此推之則驢皮膠不必定以阿水煎也伏流之泉無不可用滋陰清熱之藥皆不可以火炒也一經火炒則涼者溫而靜者動清潤失而燥烈存所謂火能革物之性也或大苦大寒大毒之品恐其太過則或炒或炮古人制法亦詳最可笑者如竹茹之類用者不過取其清氣而後人必炒而用之不知是何肺腸不但此也凡清解之劑煎須急火則藥氣尚在設緩煎濃煮即全失清涼之味矣況炒焦其藥哉鹿茸性熱升陽陰虛而陽易浮越者不可擅用目擊誤用而血脫於上以殞者多人矣鼠矢不但治女勞復也可以散乳癰通淋濁已疳脹消疝瘕海䖳本水結成煮之可化為水夫身中之痰亦由火搏其水而成者故為化痰之主藥且泄鬱火宣滯氣能消食積通二便止腹痛除脹滿惜無知之者故表之鱉一名神守故鱉甲乃安神妙藥珍珠補陰明目鎮逆安神皆取蚌性純陰感月而胎之效也今肆中所售皆粵產蛇珠但可以治風痰通經絡理癇痙與蚌珠動靜懸珠不可以之治心病也用者辨之童子小便最是滋陰降火妙品故為血證要藥必用童子者取其知識未開而無妄動之火也尤須澹泊滋味不食葷膻去其頭尾但以中間一段清澈如水者始有功效若煉成秋石昔人尚謂其中寓暖氣在所不取何後人妄造回輪酒之名令病人自飲己溺愚者誤信良可憫也夫人既病矣溺即病溺以病溺猶堪治病則無病之溺皆可為藥何必取童子戒葷腥去頭尾欲清澈而故難其事哉蓋人雖無病其飲食之精華皆已化為氣液其糟粕則下出而為便溺清升濁降誰不知之所謂病人者非有六淫之感即為五志之傷病之去路即在二便以二便為濁陰之出路也可見病人之便濁陰中更有病氣雜焉再使病人飲之是以既出之病氣更助以濁陰之穢氣仍令入腹殆不欲其病之去乎名曰回輪酒必至病亦回輪不已待其人入回輪而後已不亦傎哉況病人之溺臭穢必甚於平人極能敗胃若溺色清澈者則其病非寒即虛治宜溫養更不可令飲己溺矣何世人竟不悟也周亮工先生云親串有從余遊都門者其人謹願生平絕跡北里突生黴瘡不解所自余忽悟其故解之曰君因質弱常服紫河車京師四方雜集患黴瘡者甚夥所服之中安知無黴瘡衣胞此瘡能延及子孫氣之所沖尚能中人生子多無皮膚其胞尤為毒氣所歸君之患必由於此眾人皆以為然夫忍於食人之胞以自裨蓋仁者尚不為況未必有功而適以滋害如此可不戒哉洗冤錄云有人暱一婢而脫者斂時啟所蓋被異香四發或以為登仙實因服房藥多麝臍通透之品故耳又云人於身死之後其面或青或紫手足指甲或為青黯或為紫黑口鼻或為血出或為遍身青紫更或有肉為膚裂為脫落者豈盡服乎砒鴆而致之蓋世間無一非生人之具則無一非殺人之符偶一相犯即凝為毒非特砒鴆為然而參附為尤甚人第沉溺於補之一字盡為迷惑莫之或悟反云服以參附亦不奏功竟以委之天數抑何愚之至而天數之冤何日而得洗哉每見人日服參附而恣行殘賊不可以對屋漏以致孽業糾纏口鼻流血膚為寸裂而死者殊不少也愚謂趙養葵張景岳輩惜其未讀此書耳注世之信邪說而餌房藥喜溫補而服參附搢紳先生多犯之醫書垂戒輒藉口扶陽抑陰之說以詆其非若洗冤錄乃部頒驗用之書醫家或有來讀官場不能不讀既讀其書尚不知悟往往蹈此覆轍殆所謂孽業糾纏故不能自主者乎校洗冤錄又云夏月汗透衣切不可於烈日中曬若將干而暴雨欲來急為收納則烈日之毒即銅於內如遇酷暑汗出時偶一衣之則暑以引暑其毒立中證候全類傷寒若誤作傷寒治必至發狂諺語再誤投參耆附桂陽以益陽未有不至口鼻流血不已者此亦醫家所當知也故附錄之紀曉嵐先生云神仙服餌見於雜書者不一或亦偶遇其人然不得其法則反能為害戴遂堂言嘗見一人服松脂十餘年肌膚充悅精神強固自以為得力久而覺腹中小不適又久而病燥結潤以麻仁之類不應攻以硝黃之類所遺者細僅一線乃悟松脂黏附於腸中積漸凝結愈厚則其竅愈窄故束而至是也無藥可醫竟困頓至死又見一服硫黃者膚裂如磔置冰上痛稍減古詩云服藥求神仙多為藥所誤豈不信哉刊隱居岩谷者深山無日霧露時侵溪澗水寒人煙闃寂其服松脂蒼朮之類不過藉以祛寒濕之邪耳若富貴人尤而效之是不揣其本而齊其末矣又云世俗遇食物凝滯之病即以其物燒灰存性調水服之余初斥其妄然亦往往驗審思其故此皆油膩凝滯者也蓋油膩先凝食物稍多則遇之必滯凡藥物入胃必湊其同氣故其物之灰能自到某物凝滯處凡油膩得灰即解散故灰到其處滯者自行猶之以灰浣垢耳若脾弱之凝滯胃滿之凝滯氣鬱血瘀痰結之凝滯均非灰所能除矣接此理人所未悟先生見理甚明故有此妙解徐悔堂嘗云本草言何首烏之最大者服之鬚髮可轉白為黑余在廣西見鎮安府所產何首烏大者每重百餘斤彼處人食之與薯芋等初不聞變皓首為黑頭也又全州西延六洞諸山中土人皆以種百合為業大者每枚重五六十斤最小者亦六七斤其形與吾鄉白花百合等惟龐然特異耳土人澄為粉每斤售銀五六分物多價賤皆不以奇物視之也按觀此益見神仙服食之說為虛誕不足信又云蚺蛇出兩廣而西省為更多其形頭方口闊目光如鏡皮色黑白斑然尾甚細其末可貫數百錢土人言蛇大如人臂行即風生常豎身三四尺而逐人性最淫婦女山行者皆佩觀音藤一條否則必為其所纏以尾入陰死觀音藤遍身皆倒刺似吾鄉之虎杖而較柔人見山有此藤即知近處有蚺蛇矣其穴兩頭皆通此入則彼出彼入則此出捕者探知穴之所在群集多人各斷藤尺許攜之以往伺其入穴以婦女汙裩袒衣置諸前穴之口而燔柴草於後穴以叉入之煙滿穴中蛇不能耐遂直竄前穴而出聞衣裩穢氣即盤旋纏繞之至於破碎而不已人伺其力懈群以所齎藤遍擲其身遂垂首貼地不敢動矣復用藤作圈套其頸弄之若鰻鱔然盛諸竹筐舁之以歸宰蚺之法出置於地先取其膽膽有二在肝者曰坐膽不適於用在皮曰行膽以杖頻擊其一處則此處漸高如雞卵剖之而膽出焉蓋護疼也炭火煏干瓷瓶錮之用作傷科之藥價比兼金然後直舒其身以毛竹巨釘釘之於地剖腹剝皮畢逐段斷之其頸上藤圈至斷之為段方可棄去否則雖已剖腹剝皮尚能奮躍而起物之相制此為最甚矣其肉能祛風疾愈瘡瘍功效如神以燒酒浸之可以歷久其皮蛇大則紋細樂器中用以鞔三絃之鼓必硝熟而後可用生則易蛀易裂也其骨有名如意鉤者形僅如錢惟雄者有之為房術中上藥口銜之可通宵不倦其腹中之油力能縮陽人不可近稍近之則玉莖睪丸俱入腹中無藥可治土人云蛇生幾年則陽縮幾年屆期自能出也余在梧州時見太守永公宰一條大如屋柱長二丈餘肉味鮮美殆勝於雞按此可補諸家本草之未詳故錄之曉嵐先生又云雄雞卵能明目理不可解愚謂此等不易得之物可置弗論惟賽空青尚易造且亦近理其法於冬至日取大蘆菔一枚開蓋挖空入新生紫殼雞卵一個在內蓋仍嵌好埋淨土中約四五尺深到夏至日取出用女人衣具包裹藏瓷器中否則恐遇雷電被龍攝去也謹之卵內黃白俱成清水用點諸目疾雖瞽者可以復明乃神方也惜余未試錄此以待將來刊不易得之藥出重價而購得之亦恐不真如狗寶空青之類辨別甚難慎疾者不可試也俞瞷花云一村人自言病噎瀕危一日其子早起見草際一蟾蜍方蛻素聞人言蟾蛻可治噎膈急往取之僅得其半持以進父服之良愈是亦一奇方也惜蟾蜍不常蛻即蛻亦隨自食之人不易得耳如此類之不易得者可遇而不可求之謂也一旦遇之人人共識苟或需此而竟得之雖償以重價可焉本草自李氏綱目集其大成世皆宗之後有劉氏之本草述倪氏之本草匯言盧氏之半偈隱菴之崇原石頑之逢源香岩之解要皆各抒心得多所發明學者所當互參也而趙恕軒先生綱目拾遺蒐羅繁富辨正多條尤為李氏功臣惜書無刊本世罕知之茲錄其切於常用者如下本經滷鹼即石鹼也當以逢源為是李氏遺滷鹼而補列石鹼誤矣朴硝硝石本經錯簡李氏不察諸家踵誤亦以逢源辨正為是硇砂有二種一種鹽硇出西戎狀如鹽塊得濕即化為水或滲失一種番硇出西藏有五色以大紅者為上質如石並無滷氣李氏所引皆鹽硇也真藏硇能化血肉為水雖煅煉亦不可服注本草謂能化人心為水者正指藏硇為言也中其毒者生綠豆研汁恣飲之山慈姑處州人以白花者良形狀絕似石蒜李氏于山慈姑集解下注云冬月生葉二月枯即抽莖開花有紅黃白三色於石蒜集解下注春初生葉七月苗枯抽莖開花紅色又一種四五月抽莖開花黃白色余昔館平湖仙塘寺沈道人從遂昌帶有慈姑花一盆來親見之其花白色儼如石蒜花據土人言無紅黃花者其花開於三月而逢源慈姑下注云開花於九月則誤以石蒜為慈姑矣李氏於慈姑條下附方引孫天仁集效方用紅燈籠草此乃紅姑娘草專治咽喉口齒即綱目所載酸漿草是也乃不列彼而列此豈以慈姑又名鬼燈檠而誤之耶夫慈姑雖解毒不入咽喉口齒何得誤入又引奇效方吐風痰用金燈花根不知石蒜亦名金燈花慈姑根食之不吐石蒜根食之令人吐則奇效方所用乃石蒜非慈姑也李氏且兩誤矣注今人以慈姑入咽喉方中皆承李氏引集效方之誤也然恕軒先生目擊其花故知其誤而辨之其未見者惡從而辨之辨藥之難於此可見苟非人所共識共知之藥可擅用哉草以蘭名者有數種今人呼為奶孩兒者澤蘭也方莖紫花枝根皆香人家多植之婦女暑月以插發入藥走血分省頭草則葉細碎如瓦松開黃花氣微香生江塘沙岸旁土人採之入市貨賣婦人亦市以插發云可除䐈垢未見有入藥用者又有香草葉如薄荷而小香氣與薄荷迥別五六月間人家採以煎黃魚云可殺腥代蔥此即所謂羅勒是也未聞有入藥者又有孩兒菊葉如馬蘭而長近皆以此作澤蘭用云可入藥治血此四種皆香草惟奶孩兒香尤峻烈李氏於蘭草釋名下概以省頭草孩兒菊混列一類至集解所詳形狀則又以孩兒菊為澤蘭附方中則又認省頭草為蘭草皆誤也又謂羅勒即蘭香而逢源云羅勒與蘭香迥別當以張說為可信茵陳乃蒿屬昔人多種以為蔬本經所載主風濕寒熱熱結黃疸濕伏陽明所生之病皆指綿茵陳而言其葉細於青蒿者是也干之色作淡青白色今人呼為羊毛茵陳者是也其性專利水故為黃疸濕熱要藥一種生子如鈴者名山茵陳即角蒿其味辛苦有小毒專於殺蟲治口齒瘡尤妙今人呼為鈴兒茵陳藥肆中俱有之此不可以不辨而概誤用之也綱目以茵陳角蒿分別故是卓識而未能指出俗以角蒿為茵陳且將山茵陳治眼熱赤腫方引入茵陳條下至角蒿下亦無一語言其苗葉形狀者或尚未知此即山茵陳耶逢源云南瓜至賤之品綱目既云多食髮腳氣黃疸不可同羊肉食令人氣壅其性滯氣助濕可知何又云補中益氣耶前後不相應如此吳遵程云南瓜本益氣惟不可與羊肉同食則令壅滯此吳氏為兩袒之說不知南瓜本補氣即與羊肉同食脾健者何礙惟不宜於脾虛之人如今人服參耆亦有虛不受補者大凡味之能補人者獨甘色之能補人者多黃南瓜色黃味甘得中央土氣最厚故能溫補脾氣不得以賤而忽之昔在閩中聞有素火腿者云食之補土生金滋津益血初以為即處州之筍片耳何補之有蓋吾浙處片亦名素火腿者言其味之美也及索閱之乃大南瓜一枚蒸食之切開成片儼與蘭熏無異而味尤鮮美疑其壅氣不敢多食然食後反覺易餒少頃又盡啖之其開胃健脾如此因急叩其法乃於九十月間收絕大南瓜須極老經霜者摘下就蒂開一竅去瓢及子以極好醬油灌入令滿將原蒂蓋上封好以草繩懸避雨戶檐下次年四五月取出蒸食名素火腿者言其功相埒也刊南瓜種類不一性味亦殊綱目之說是也早實者其形扁圓與黃瓜同時杭人呼為黴瓜嫩時充饌頗鮮亦堪果腹而性助濕熱雄嘗與羊肉同食者兩次皆患瘧嗣後不敢下箸晚實而形長者良杭人呼為枕頭瓜老而黃者耐久藏味甚甘蒸食極類番薯亦可和粉作餅餌功能補中益氣飢歲可以代糧先慈勸人廣種以救荒種愈佳者子愈稀近蒂處半身皆實不能開竅取瓤近臍處始有子若此種者宜就臍開取矣槍子入肉南瓜瓤敷之即出陳東竹磋尹云火藥傷人生南瓜搗敷立愈大腹子乃大腹檳榔與檳榔形似而性稍異綱目謂其功用無殊故藥肆中多以大腹子代檳榔率由李氏之言而誤也逢源辨之是矣鳳仙花一名透骨草以其性利能軟堅也綱目有名未用收透骨草引集效經驗諸方載其主治而遺其形狀蓋不知其為鳳仙花別名也又鴨腳青乃藍澱中一種李氏引普濟方又失考覈何其未博詢耶綱目蔓草內載含水藤引交州記云狀若葛葉似枸杞多在路旁行人乏水處便嚼此藤故名菜部又載東風菜按廣志廣州有涼口藤狀若葛葉如枸杞去地丈餘絕之更生中含清水渴者斷取飲之甚美沐發令長此藤又名東風菜先春而生東風乃至農夫以驗土膏之動一名綠耳可為蔬據此形狀解渴與含水藤同其可為蔬名東風又與東風菜同則是一物也李氏誤以為二一收入蔓一收入菜未免考覈失當良由為廣州記所誤耳綱目以海月為江瑤柱復附海鏡不知海月即海鏡而江瑤非海月也此乃承嶺表錄之誤按海物疏云海月形圓如月亦謂之蠣鏡土人磨其殼以為明瓦者是也嶺南謂之海鏡又呼為膏藥盤江瑤殼色如淡菜上銳下平大者長尺許肉白而韌柱圓而脆與海月絕不相類何可牽為一物耶李氏以海鏡附在海月條下注引郭璞江賦璅𤥐腹蟹以為即此物則又大誤不知璅𤥐又非海鏡也海南志璅𤥐狀似珠蚌殼青黑色長寸許大者二三寸生白沙中不汙泥淖乃物之最潔者也有兩肉柱能長短又有數白蟹子在腹中狀如榆莢合體共生常從其口出為之取食然璅𤥐清潔不食但寄其腹於蟹蟹為璅𤥐而食食在蟹而飽在璅𤥐故一名共命嬴又曰月蛄每冬大雪則肥瑩如玉日映如雲母味甘柔蓋海錯之至珍者又有海鏡一殼相合甚圓肉亦瑩潔有紅蟹子居其腹為取食一名石鏡其腹小蟹曰蚌孥據此明是二物在璅𤥐腹者則白蟹子在海鏡腹者則紅蟹子又各不同余在奉化親見璅𤥐形狀迥與海月不同何能強合耶綱目蟹下集解引述諸種謂蟛蜞大於蟛螖生陂池田港中有毒令人吐下不可食故蟛蜞主治惟取其膏塗濕癬疽瘡外治而已又云似蟛蜞而生沙穴中見人便走者沙狗也不可食不知二種皆可食按介譜生毛者曰毛蟛蜞有毒多食發吐利而潮州人無日不食以當園蔬又海錯疏松江上海出沙狗即沙中小蟹土人取之以酒糟釀食殼軟內含脂膏凡食置盞中以沸酒沃之少頃則殼內脂漿盡浮於外惟剩空殼酒更甘美食之益人吳淞人以為珍品呼為沙里狗李氏以為不可食未免為古書所愚耳本經桑根白皮主傷中五勞六極羸瘦崩中脈絕補虛益氣此乃指桑椹而言後人並列根皮之下世多不察仲醇遂以為根皮補元氣性寒而能除內熱則以上諸證自愈真同癡人說夢寇氏頗疑本經獨遺其椹不知根皮何以能治傷中等證惟石頑獨能勘明其誤而功歸於椹瀕湖博識何於本經尚爾承訛耶愚按桑上寄生取其得桑之餘氣其功尚爾善乎理虛元鑑言物性有全身上下純粹無疵者惟桑之與蓮故桑皮性不馴良之說未可信而寄生罕真不必用與其用他樹之寄生何如用桑樹之嫩枝庶免重價購偽藥而反滋弊竇也刊張氏醫通可謂集諸家之大成而本經逢源一書尤具卓識豈但論桑椹之功為發前人未發乎近閱鄒潤安先生本經疏證則諸賢議論皆未盡當況潤安學問淵博寇氏張氏之書亦已見過乃於桑根白皮下疏云或問本經桑根白皮之功舉天下之虛證幾盡治之宜補劑無與匹者矣何後賢視之其功一若甚狹耶余謂不然考千金於五臟之勞大旨以四氣調神大論中逆四時之氣一節為主因分析其輾轉虛實致使關格生勞於六極則以陰陽應象大論天氣通於肺至治五臟者半死半生為總論分列風論痹論五臟四時所受病於筋脈肉氣骨五臟之下以藏氣法時論五臟虛實見象綴之惟精極則以謂通主五臟六腑之病候獨歸重於腎是勞不盡屬於虛極有以異於竭既有盛有衰有虛有實又有四時之邪繩貫其間其為虛證已無幾矣況勞極之病有由傷中者有由傷外者有羸瘦者有不羸瘦者桑根白皮之所主僅傷中之五勞六極且羸瘦者不既已不廣歟所以然者桑根白皮為物甘辛而寒寒者其氣下歸於腎甘辛者其味上達於肺脾肺脾者水津運化之通衢腎者水津歸宿之廬舍上焦運化不愆則中之傷者以漸可瘳下焦歸宿有方則外之羸者以漸能旺且其物堅緻韌密潔淨無瑕剔其皮為紙則牢固難敗以其葉飼蠶則吐絲連續故於崩中脈絕之候又能補虛益氣明其於內崩則能補虛而去者可復於脈絕則能續氣而斷者可聯也曰桑根白皮還瘦為豐固有諸矣別錄以之去肺中水氣肺中有水必面浮又以療水腫腹滿臚脹非過不羸瘦乎夫惟其不羸瘦轉有以知其羸瘦矣水為有形之物必其胸腹中有空隙乃能容之如其肌肉豐盈氣道充滿則水更居何所且脾肺之氣化連屬水道之通降得常所以治羸瘦者正其所以治水又豈有二致哉雄按以補益之功歸之於椹謂為闡發桑椹之功固無不可而鄒氏之書疏經旨以證病機俾古聖心源昭然若揭不但有裨後學足以壓倒前人粉鍚即鉛粉乃用鉛打成薄片入甑以醋一瓶同蒸化作粉也今杭城多有業此名曰粉坊工人無三年久業者以鉛醋之氣有毒能鑠人肌骨且其性燥烈坊中人每月必食鵝一次以解之則其不能無毒可知綱目粉錫集解下引何盂春余冬錄亦云作粉工人必食肥豬大肉飲酒及鐵漿以弭之枵腹中其毒輒病至死長幼為毒熏蒸多痿黃癱攣而死蓋亦未嘗無毒也或曰製造之時其氣有毒若成粉則不毒如果有毒則前人方中何以入食劑而又不遺制解之法殊不知此物性能制硫除酒酸雌黃見之則黑糟蟹得之不沙入藥能墮胎敷面多生粉刺其剝蝕猛悍之性等於砒硇惟少服之則可服後糞多黑色仍還其本體律例載有婦服鉛粉至死手足皆青黯可知其毒矣而李氏於粉錫氣味下云辛寒無毒諸家本草多襲其訛誤世匪淺故詳辨之天竹黃綱目止載釋名而無集解出產採取一切形狀皆未之及按筆談補云嶺南深山中有大竹竹中有水甚清澈溪澗之水皆有毒惟此水無毒土人陸行多飲之至深冬則凝結如玉乃天竹黃也王彥祖知雷州日盛夏之官山溪澗水皆不可飲惟剖竹取水烹飪飲啜皆用竹水次年被召赴闕冬行求竹水不可復得問土人乃知至冬則凝結不復成水遇夜野火燒林木為煨燼惟竹黃不灰如火燒獸骨而輕土人多於火後採拾以供藥品不若生得者為善此說可補瀕湖之未備續隨子綱目集解下所載不甚明晰盧氏辨別精詳即土人所謂半枝蓮也越人飲上池水即半天河水也雨也李氏必以樹穴中水當之誤矣鶡鴠十月毛落而號寒忍凍豫聚柏實食之又自食其遺遺而復食故其矢為五靈脂此東壁所未詳者冬蟲夏草論物之變化必由陰陽相激而成陰靜陽動至理也然陽中有陰陰中有陽所謂一陰一陽互為其根如無情化有情乃陰乘陽氣有情化無情乃陽乘陰氣故皆一變而不復返本形田鼠化鴽鴽化田鼠鳩化鷹鷹化鳩悉能複本形者陽乘陽氣也鉚石化丹砂斷松化為石不復還本形者陰乘陰氣也夏草冬蟲乃感陰陽兩氣而生夏至一陰生故靜而為草冬至一陽生故動而為蟲輾轉循運非若腐草為螢陳麥化蝶感濕熱之氣者可比入藥故能治諸虛百損以其得陰陽之氣全也然以冬取者良張子潤云夏取者服之可以絕孕周兼士云冬取者可種子治蠱脹也刊得陰陽之氣既全具溫和平補之性可知因其活潑靈動變化隨時故為虛瘧虛痞虛脹虛痛之聖藥功勝九香蟲且至冬而蟄德比潛龍凡陰虛陽亢而為喘逆痰嗽者投之悉效不但調經種子有專能也周稚圭先生云須以秋分日採者良雄謂夏取者可治陽氣下陷之病解𤸫草葉如建蘭而闊厚入冬不凋初茁芽背作紫色長則色青夏開紫花成穗亦如麥冬狀其根有子分苗種極易繁茂以其出粵中故俗呼為廣東萬年青綱目有名未用吉祥草下瀕湖所引吉祥草即此也時俗妊婦臨蓐以此草連盆移至產室云能解產厄免血𤸫此草色澤青翠葉葉勁直如箭入產室則葉皆軟垂色亦槁瘁必經數日乃復鮮豔亦一奇也其根下子入藥用性涼味甘清肺理血解火毒為咽喉妙藥或云搗汁加冰片少許灌數匙治小兒急驚立效注𤸫本作員音運刺熱篇其逆則頭痛員員脈引沖頭也後人加疒為𤸫俗作暈非然通用已久不能正也南天燭人但知其有補益之功而三奇湯治小兒天哮甚效方用經霜天燭子臘梅花各三錢水蜒蚰一條俱預收臨用水煎服一劑可痊又治三陰瘧用天燭隔年陳子蒸熟每歲一粒早晨白湯下其葉洗眼去風火熱腫眵淚赤障清明插檐柳條盧不遠但言治白濁甚妙若大人小兒溺閉不通者煎湯內服外熏皆效惟向南者入藥百草鏡云桑葉採過二次者力薄無用入藥須止採過頭葉者則二葉力全至大雪後猶青於枝上或黃枯於枝上皆可用若經雪壓更妙雪晴之日即採下線穿懸戶陰乾其色漸黑風吹作鐵器聲故一名鐵扇子治腸風目疾咳嗽盜汗愚按雖治盜汗而風溫暑熱服之肺氣清肅即能汗解其葉有毛能治皮膚風熱癮疹色青入肝能息內風而除頭痛止風行腸胃之泄瀉已肝熱妄行之崩漏胎前諸病由於肝熱者尤為要藥米油乃煮粥鍋內滾起沫團醲滑如膏油者是也大鍋能煮五升米以上者良一名粥油其力能實毛竅滋養五臟肥肌體填補腎精每晨撇取一碗淡服或加煉過食鹽少許亦可黑瘦者服百日即肥白精清無子者即精濃有子愚按精生於穀粥油乃米穀之精華補液生精固勝他藥但必其人素無痰飲者始有效否則極易成痰推之魚鰾海參及一切醲郁之物無不皆然所以治病總要先察其體氣臟性之何如而後辨其藥之宜否也蘭熏一名火腿和中養胃補腎生津益氣血充精髓治虛勞怔忡止虛痢泄瀉愚按又名南腿蓋以南產者為勝然南產惟金華之東陽造者為良浦江次之義烏又次之他邑即不佳其造法於十一月內取壯嫩花豬後腿用力自爪向上緊捋有瘀血一股向腿面流去即拭去晾一二日待乾將腿面油脂細細剔去每腿十斤用燥鹽五兩竭力擦透其皮然後落缸腳上懸牌記明月日缸半預做木板為屜屜鑿數孔將擦透之腿平放板屜之上余鹽灑勻腿面腿多則重重疊之不妨鹽烊為滷則從屜孔流之缸底醃腿總以腿不浸滷為要訣以著滷則肉黴而味必苦也既醃旬日將腿翻起再用鹽如初醃之數逐腿灑勻再旬日再翻起仍用鹽如初醃之數逐腿灑勻再旬日自初醃至此匝一月矣將腿起缸浸溪中半日將腿刷洗極淨隨懸日中曬之故起缸必須晴天若雨雪不妨遲待如水氣曬乾之後陰雨則懸當風處晴霧再曬之必須水氣幹盡皮色皆紅可不曬矣修圓腿面入夏起花以綠色為上白次之黃黑為下並以香油遍抹之若生毛蟲有蛀孔以竹籤挑出香油灌之過五月裝入竹箱盛之再至次年即為陳腿味極香美甲於珍饈苟知此法但得佳豬雖他處亦可造也最補益者取腳骨上第一刀刮垢洗淨整塊置盤中飯鍋上蒸七次切食若湯煮則力薄矣然必上上者始可蒸食也注淡風豬肉名千里脯功同火腿如醃腿不得其法者則風肉甚易亦為病後產後虛人調補之上品也但於冬令極冷之日取壯嫩好豬肋肉亦須㷟淨即取不可浸水灌氣晾乾之後割去裡面浮油及脊骨肚囊用白糖霜擦透其皮並抹四圍肥處懸於風多無日屋檐下至夏煮食味甚甘香亦可任加鹽醬蓋豬肉得糖霜則不痵故臘月煉豬脂入糖霜少許則久藏不壞雖盛夏若以糖霜收豬脂亦不壞凡烹庖豬肉少加糖霜味更佳也刊昔老友範君慶簪語雄曰解渴莫如豬肉湯凡官爐銀匠每當酷暑正各縣傾造奏銷銀兩納庫之際銀爐最高火光迎面故非血氣充足者不能習此業然人受火爍其渴莫解必市豬肉以急火煎清湯撇去浮油缸盛待冷用此代茶雄聞而悟曰此渴乃火爍其液非茶可解豬為水畜其肉最腴功專補水救液允非瓜果可比因此推及虛喘虛秘下損難產諸證之無液者無不投之輒應乃知豬肉為滋陰妙品也若終身肉食則與臟氣相習有見其功過者有不見其功過者蓋人之體性不同亦猶谷蔬果蔬之類有須肥壅不須肥壅之異也且肥壅過當反不結實敵人亦有滋補過當而反痿弱者能盡物之性然後能盡人之性此之謂哉明乎此則家之於財也亦然故善保富者宜散其財苟不知此而徒欲家之肥必至子孫愚悖多藏厚亡而後已良由昧於物性遂以梏其人性嗚呼豬之肥者豬之患此養身保家之不可不知物性也愛縱筆及之丁香油出南番乃用母丁香榨取其油色紫芳香辛烈番人以琉璃器盛之蓋偶不密即香達於外性大熱透關竅祛寒濕力更敏於丁香凡胸腹痛脹嘔呃泄瀉痞聚疝瘕諸證之屬於寒者用塗患處及臍中皆效若紫中帶黃黑色辛烈觸鼻作樟腦氣者乃樟木油也不可不辨更有肉桂油檀香油主治可以類推校近有薄荷油亦自舶上來患風熱頭疼齦痛者搽患處亦良刊恕軒先生錢塘人著利濟十二種本草綱目拾遺十卷醫林集腋十六卷祝由錄驗四卷本草話二十二卷花葯小名錄四卷攝生閒覽四卷奇藥備考六卷養素園傳信方六卷囊露集四卷串雅八卷升降秘要二卷藥性元解四卷載桐鄉顧菉厓書目合編惜書多未梓惟望藏其全稿者力謀壽世為幸解諸藥毒濃煎甘草湯涼飲飲地漿水白扁豆生研末涼水和服解誤服人參生蘆菔搗汁飲或蘆菔子煎湯服解諸熱藥毒綠豆或甘草煎濃湯冷服解蒙汗藥毒飲冷水忌服姜白茯苓五錢生甘草二錢甜瓜蒂七個陳皮五分水煎冷服大吐而愈解巴豆毒芭蕉葉或石菖蒲搗汁飲大黃黃連煎湯冷服巴豆貼肉潰爛生黃連末水調敷解椒毒地漿水或新汲水飲啖大棗數枚解冰片毒飲新汲水解附子烏頭天雄草烏射罔毒綠豆或黑豆煎湯冷飲甘草黑豆同煎冷服解鉤吻毒麻油或桐油或韭菜汁灌之白礬化水服金銀花甘草各一兩生大黃一錢煎服解藜蘆毒雄黃一錢研水飲藜蘆敷肉毒氣入內煎蔥湯服解仙茅毒大黃朴硝煎服解芫花毒防風煎湯服解藤黃毒齏菜水溫服解誤服相反藥毒蠶退紙燒灰冷水和服解野蕈毒生甘草二兩白芷三錢煎服以鵝翎探喉不吐即瀉金銀花搗汁飲綠豆生研新汲水攪之澄清服解白果毒白果殼煎湯服白鯗頭煎湯頻灌滾水磨木香入麝香少許灌之解苦杏毒杏樹皮煎湯服解櫻桃毒青蔗漿灌之解諸果毒豬骨燒灰煎服玉樞丹水調灌解桐油毒食乾柿解石藥毒芹菜或葵菜搗汁飲解鍾乳毒豬肉煮食解雄黃毒防己煎服解皂礬毒麥面打糊頻服解砒毒硼砂一兩研末雞子清七枚調灌桕樹根或冬青葉或夏枯草搗汁飲明礬大黃研末新汲水調灌中砒毒渾身紫瘰者急作地漿頻灌待瘰散盡一吐即蘇雖冬月亦須此法砒霜敷身患處痛潰以濕泥頻塗設毒氣入內而作吐瀉飲冷米醋解之或生綠豆研末麻油調服瓷鋒入腹生紅蘆菔杵爛吞干餳糖頻吞玉石入腹蔥白煮濃汁服金銀入腹紅棗煮爛恣食雞矢半升水淋取汁一升飲之日三四次死者可活銅鐵錫入腹木賊草研末雞子清調服連根蔥煮汁麻油和服解鉛粉毒蘆菔或荸薺搗汁飲麻油蜂蜜飴糖和服解銀黝毒生羊血灌之吐盡即愈刊黝字俗寫甚多諸書所說不一雄幼時不知所從夜忽夢一人大聲曰當從北宮黝之黝為是醒而異之遍考字義固宜作黝語云思之思之鬼神通之豈不信然故附識之解水銀毒開口花椒吞二錢解輕粉毒川椒去目白湯吞服生扁豆浸透搗汁飲解蠱毒濃煎石榴皮飲解斑蝥蚖青毒六一散涼水和服解黃蠟毒冬葵子或白菜煎湯飲解蟹毒生薑汁或藕汁蘆根汁灌之誤犯荊芥誤同柿食均濃煎木香湯飲解蝦毒橘皮煎湯飲解蛙毒車前草搗汁飲解河豚毒麻油灌之茅根蘆根各一兩瓜蒂一個煎服紫蘇或薄荷搗絞濃汁飲或以乾者煎濃服解鱉毒靛青水灌鹽化水飲解鱔魚毒食蟹即愈或地漿灌犯荊芥亦飲地漿解鴆羽毒犀角磨汁飲金銀花八兩煎汁二碗入白礬寒水石花粉各三錢石菖蒲二錢麥冬五分煎灌待目不上視口中能言照方減半再服二劑即愈解鶴頂毒糯米煮粥杵爛過量啜之亦解鴆羽毒解雄雞毒磨犀角飲醋飲之解牛馬肉毒飲人乳石菖蒲研水服蘆根或菊花連根搗汁和酒服解馬肝毒豬骨燒灰或淡豆豉或頭垢並水調服服豬脂一斤解狗狼肉毒蘆根搗汁飲杏仁去皮尖四兩研開水和分三服解羊肉毒甘草煎服栗子殼煎飲解豬肉毒芭蕉根搗汁飲白沙糖一兩白湯調服解鹽滷毒生甘草三兩煎汁冷飲生黃豆水研絞汁飲解酒毒人乳和熱黃酒服外以生熟湯浸其身則湯化為酒而人醒矣解燒酒毒蘆菔汁青蔗漿隨灌綠豆研水灌或濃煎枳椇子湯灌大醉不醒急以熱豆腐遍體貼之冷即易以醒為度外用井水浸其發並以故帛浸濕貼於胸膈仍細細灌之至蘇為度凡燒酒醉後吸菸則酒焰內燃而死亦有醉後內火如焚而反惡寒者厚加衣被亦能致死即口渴飲冷只宜細細飲之以引毒火外達若連飲過多熱毒反為驟冷所遏無由外達亦多閉伏不救刊海陽汪葵田先生古愚消夏錄云毒之為毒暗藏於服食起居中更有令人不可方物者如日用飲食其物性相反不知誤食以及庖人不善烹飪未得其法食之即為中毒不必服砒鴆始為中毒也此言良是其所輯解毒編一卷最為詳備而近來尤有甚於砒鴆者則亞片煙也以砒鴆不易得而亞片煙遍地皆有故殺人為獨廣焉愛附解救方如下解亞片毒肥皂或金魚杵爛或豬矢水和絞汁灌之吐出即愈生南瓜搗爛絞汁頻灌甘草煎濃汁候冷頻灌以亞片灌豬腸中扎其兩頭懸而待之久則腸裂而斷其性之毒烈能消刮脂膏也如此憶甘蔗名接腸草且甘涼解毒榨汁頻灌必可得生葭管飛灰惟河內縣之葭應候而飛可見藥之所產各有地土之宜矣而物性各有專長如蜜者密也故能固密護內酥者蘇也故能融化攻堅又各有所制如象牙以醋浸一宿則軟如腐再用木賊水煮之則堅如故白銀觸倭硫黃則色黑犀羚之角畏人氣珍珠畏屍氣並不可近鐵與柏木梨與蘆菔同藏冬採橙橘藏綠豆中皆不壞銅以鳧茈水煮可刻字木槿葉揉水浸絲絡則不亂桃杏仁可澄水血汙衣嚼蘆菔擦之即潔墨汙衣生半夏或白果杏仁杵爛揉之即去治胞衣不下用芡葉囫圇不碎者一張煎湯服立效若芡葉裂作兩片者胞衣亦分裂而下真奇方也此皆不可以理測者圍爐炭烈分開易滅不分易熾用草紙一張覆於火頂燒過灰存則火不焰而四布矣嚴冬向火惟桑柴炭不燥皮膚養老者宜知之不但為煎藥所珍也校上論藥性畢拱辰云泰西格致名流值有殊死重因多生購之層剝寸刲批郤導窾毫髮無不推勘故其著論致為詳盡按新莽時捕得王孫慶使太醫尚方與巧屠共刳剝之量度五臟以竹筳導其脈知所終始亦可治病又宋慶曆間待制杜杞執湖南賊歐希範與酋領數十人盡磔於市皆剖腹刳其腎腸使醫與畫人一一探索繪以為畫事與西土頗類至於精思研究不作一影響揣度語則西士所獨也愚謂人與動物皆氣以成形經云出入廢則神機化滅如革囊盛水而不漏其活時之元府已無可驗故有形之死質可睹無形之功用不可睹也縱精思研究斷不能如西遊記所說鑽入人腹周行臟腑經絡盡悉其所以然而後出以著書不過批郤導窾推測其所當然而已故其所著人身說概人身圖說等書雖有發明足補華人所未逮然不免穿鑿之弊信其可信闕其可疑是皮裡春秋讀法也校人身經絡臟腑雖靈樞素問言之鑿鑿然上古聖人以不忍之心行不忍之政著書療病意在仁民不過以天縱之明推測其理而已見其生不忍見其死庖廚尚遠豈忍剖割同類而為屠劊作俑哉新莽杜杞忍為此事而太醫之書畫人之圖皆不傳於世後之談內景者又不屑詢於屠劊之流若非泰西之書入於中國則臟腑真形雖飲上池水者亦未曾洞見也注說概云人周身骸骨大者二百餘塊細小者一百餘塊小者之形如米粒脂麻用以聯絡接臺於大骨交界處共成全體按洗冤錄云人骨三百六十五節合周天三百六十五度而此但云大小三百餘塊竟不定其數者以人身骨數略有多少不同也金鑑云男子巔頂骨三叉縫女人十字縫是骨形不同也又洗冤錄云男子骨白女人骨黑是骨色不同也男子頭骨八片蔡川有九片者女子頭骨六片是骨數不同也男子肋骨二十四條慶元人有二十二條者女人肋骨二十八條轉肘骨輔腿骨併名髀骨女子皆無按晉文公駢脅是肋骨不同文之明脊骨連腦是脊骨不同張獎譽口齒四十是齒骨不同胡敏庶兄弟三人手十指各生六節是指骨不同張文昌膝骨大於腿是膝骨不同他如平人肋骨有十六十八條者齒亦有二十三四不等者蓋天地生人秉氣厚薄賦質不齊無足為異楊素園明府云此說是也嘗檢頭骨有渾成不分片數者其女子之骨較男子尤瑩白未見有黑色者故洗冤錄一書最不可泥說概又云背脊骨共三十四節悉有管軸相連承受如門臼樞軸然每節兩邊有小竅以通筋脈脊骨中有髓上下相通按此當從內經二十四節為是洗冤錄云頸項骨五節脊背骨六節脊膂骨七節腰眼骨五節方骨一節共二十四節方骨形長方有八竅作兩行如博具中人牌式其下即尾蛆骨男子者綴脊處凹兩旁皆有尖瓣如菱角周布九竅女人者綴脊處平直周布六竅新論亦云脊骨二十四節頸骨第一節乃承頭之首節其形與別節有異因其功用不同也其中孔大於下節如瓠蘆之形孔前近邊有微凹蓋銜接次節之榫使頭轉動利便也此兩節之所以異於余節者因人首必須左右轉盼故次節有榫凸出如門之樞後有堅韌筋帶緊相纏縛使首節轉顧靈活嘗見人以兩手挾把小兒頭而懸舉以為戲者殊險極可畏也蓋下身之重繫於次節若使筋帶裂絕則樞紐脫陷而首節開離一壞髓柱即能害命或驟然扭舉害尤甚焉說概論脆骨云其在內為護守為黏連在眼司開闔在耳司聽在鼻司臭在喉司呼吸又曰心窩之下皆脆骨按洗冤錄云心骨一片狀如錢大即心坎骨金鑑名蔽心骨亦名鳩尾骨損此骨者立斃又胯骨分左右形如月牙其兩骨梢頭鑲攏處名架骨架骨之上有羞秘骨一塊如指頭大薄如指甲極柔脆色白如玉私一人即有一點青痕閱人多則青黑殆遍死後日久即腐化此二脆骨西人未詳不知何故又人身圖說所言臟腑之形與靈素難經之論迥然不同或者疑中外人形稍異臟象亦殊道光間玉田王勳臣先生謂著書不明臟腑真是癡人說夢治病不明臟腑何異盲子夜行概古人以無憑之談作欺人之事謂心肝肺以分兩計之每件重幾許大小腸以尺丈計之每件長若干胃大幾許容谷幾鬥幾升其言彷彿似真其實臟腑未見因不避穢汙親歷審視虛心訪察積四十年之考證而著醫林改錯一書所載臟腑諸形與圖說略同近閱惠愛醫館全體新論云世有古今地分中外人之形貌各有不同至臟腑功用血氣運行無少焉異俞理初熟於內經因未見改錯過信古書遂謂中外稟質不同生源亦異噫此何異俗吏做案以合例哉且云因臟腑不同故立教不同夫泰西之教雖不同於中國而彰善癉惡未嘗不同蓋立教不同者何必臟腑不同耶孔孟楊墨並生中國而立教不同者非有形之臟腑不同乃無形之性道不同也推之舜象惠蹠生於一本而聖狂迥別者豈臟腑之不同乎世斥謬妄者曰此人別有肺腸非言其肺腸之形不同也亦言其無形之心術不端以致氣質偏戾而志向乖僻也想俞氏誤解此言故有此論惟引素問證明橫骨一段頗精因錄於下並以同志所論數條附之俾讀其書者得以參考焉人身圖說外陰橫骨處為發便毒之所凡與女人汙穢者交合其骨受熱毒動即發其病及黴瘡等患俞氏云檢素問骨空論曰督脈起少腹下骨中央又曰督脈生病治督脈治在骨上解者以為脊骨實則本經少腹下骨即外陰上橫骨也素問氣府論云衝脈氣挾鳩尾外至臍寸一挾臍下旁至橫骨寸一是腹脈法也蓋督任沖為表裡督脈起橫骨其下行者所沖其繞絡陰器及上俠脊交顛至目內眥者為督惡中督脈故病至胸督脈附巨陽膀胱合少陰腎後世醫書俱不曉乃別之為奇經又言宜與十二經並論實則十二經在手足指督任在橫骨沖在氣也楊梅瘡者宋竇漢卿瘡瘍全書及名醫類案謂之黴瘡既外洋有之應曰洋黴瘡證治準繩言肝腎二經景岳全書言衝脈受病皆似是而非也得此書橫骨一言允為中肯雄按內經骨中央下接云女子入系廷孔其孔溺孔之端也則所謂少腹下骨確指外陰橫骨無疑治在骨上者治其脈所起處也
