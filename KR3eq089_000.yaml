body:
  text: 書人身圖說後黟俞理初先生癸巳類稿有書泰西人身圖說一首謂彼國之臟腑與中國異羅舉數事若辨黑白余初閱之以為泰西醫術內景盡此矣嗣閱人身圖說乃知俞氏涉獵浮文攬其標而未究其蘊也後又從潛齋借得泰西人身說概及玉田王清任醫林改錯讀之益知俞氏之謬俞氏曰其地人心居左脈又發自心左以為西人稟賦異於中國今按圖說並無人心居左之說惟有一條或曰心之所當在左邊蓋於此所見動與喘息曰左邊心動是於左之穴為生活德所積及脈絡所發之根故愈顯其動勝於右邊玩其文義似設為問答問者疑心在左邊答者謂左邊之動乃心左穴所致非心在左也俞氏錯會文義至於脈發心左則中西一例王氏目驗華人三十餘屍皆大絡從心左穴出與靈樞不合與圖說合不知是古今之異抑古書之訛不得援古書而強謂彼國自有肺腸也俞氏又曰圖說謂血絡見脈絡不見者血絡是靈樞絡脈其絡脈則經脈此二說望文生義全未理會泰西人謂人身有二絡一血絡在內一脈絡在外相黏不離皆有干有枝有經有緯說概及改錯二書所驗皆同謂脈絡為衛血絡為營則可今強派脈絡為干血絡為枝豈非捫槃說燭乎俞氏又曰公細線是時辰表中發條今按其書中之例一物獨用者稱本諸物合用者稱公故有公膜公管路公細體諸名公細線亦其一耳不得以表中發條為解俞又曰中土人肺六葉彼土四葉按王氏目驗華人肺四葉則中國非盡六葉矣圖說謂肺四葉或有五葉者二葉之中發一小葉則彼土亦非盡四葉矣俞又曰中土人肝七葉彼土三葉王氏目驗華人肝四葉則中土非盡七葉圖說謂人之肝葉或止一或止二極多不過三則彼土亦非盡三葉矣俞氏又曰中土人心七竅彼土四竅王氏目驗華人心無竅止有左邊一竅為大絡之本安見其為七竅也俞氏又曰中土人腸二彼土人腸六所謂六者圖說所述十二腸潔腸穢腸瞎腸頸腸下直腸共為六腸其上直腸即幽門也下直腸即肛門也瞎腸一頭通一頭塞與頸腸在腹左右不知是彼土所獨抑華人所同非目睹不敢決總之盤旋之腸只潔穢二腸潔即小腸穢即大腸未見其為大異也俞又曰中土睪丸二彼土睪丸四又曰儒自捫睪二隱約其四睪之文耳夫圖說既隱約其文先生安得懸揣而知其為四乎今按圖說論睪丸篇明言其數二不言四也且書中論睪丸經絡最多無一語可附會及四睪者惟言睪丸有小體豈因此而誤耶然前注中已明言是轉折之絡似睪丸底分之小體則小體乃激發絡非丸也又圖中繪睪丸作兩囊狀分於左右兩囊宜有四丸豈因此而誤耶然所繪是丸非囊欲其經絡分明故離繪之分於左右非二囊而四丸也先生指鹿為馬反謂書之隱約其文豈非傎耶其他不及一一致辨先生謂此書在中國二百年矣未有能讀之者今始得其指歸及余以原書質之其疏略如此是仍未之能讀也古人謂治經者必研群經乃始可通一經先生止見圖說一編故有此臆說若見人身說概諸書彼此參校亦當貫通矣今欲為西醫內景書遲遲不敢落筆正恐所見西人書少又蹈俞氏之轍耳仁和胡琨次瑤書醫林改錯後余素疑各醫書自靈素以及漢晉唐宋元明諸名家以來言臟腑經絡者皆欠明晰因不得目睹無可考察是以今之業醫者不悉臟腑之真形氣血之道路見一證則茫然不知其處揣摸意度約略施治以病試藥以藥探病偶然中的遂為定法久之或效或不效亦不自知其所以然此非業醫者之過乃自古無真傳之故也即如靈樞素問本聖人經典一經秦火即非全書後人串插附會居多間有原文又為後世註釋錯誤數千年來以訛傳訛無人知之譬如鐘表損傷必須鐘表匠修之以其能知其中之運用也醫亦如之余隨任雲南之臨安郡時嘉慶丙子年有夷匪高羅依造反軍營不時決賊初不敢看久漸膽壯因是叛夷無主收屍遂令行刑人檢洗其臟細細查看閱過數十人始知歷代醫書中臟腑圖說皆謬至道光辛卯年在京都遇直隸玉田縣勳臣王清任先生談及臟腑伊已先得我心據云伊於嘉慶丁巳年遊灤州之稻地鎮其時彼處小兒正患瘟疫疹痢十傷八九該地鄉風不肯掩埋用席包裹棄之荒郊犬食鳥殘者破腹露臟遍地皆是因得檢視甚詳與余所見吻合不差毫髮惜先生只見已死之臟所繪圖說指示已往之錯謬備陳現在之形質未能申明飲食氣血之運用余就靈素二經晨夕揣度日夜悟會始識靈素中原有明文耳如經云食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行據此一段經文而論前人之言胃者皆謂上有一口曰賁門下有一口曰幽門是胃止二門今見實有三門賁幽之外更有津門津門上有一管分三叉上叉通心中叉通肝下叉通脾脾通肺心通腎肝通膽則知食入於胃借胃下丹田真陽蒸騰精汁上出津門由津管之上叉入心由心分布其清輕之氣入督脈化氣其精華之汁入任脈化精其重濁之汁入衝脈化血督脈貼脊是一身之總氣管衝脈在中又貼督脈是一身之總血管任脈近腹是一身之總精管故經云督屬總彙沖為血海任主包胎食入於胃其汁液由津門蒸騰入津管之中叉入肝由肝分布於周身之筋由肝運膽積膽汁上供二目故年老膽汁枯則二目昏花不明飲入於胃被真陽蒸騰上出津門之下叉入脾由脾分布其水之清輕者上歸於肺布散於五經皮膚為津液潤澤周身內外其水之渣滓而濁者入水道中滲入膀胱為溺夫心者乃受穀氣之津液精華而分注於督沖任三脈化氣化血化精者也肝者受穀氣之津液灌溉周身之筋者也脾者受胃之水氣分布於上下者也肺者受脾之水精布津液於五經皮膚灌溉內外者也腎者收藏督脈中霧露之精氣潤澤周身之骨者也督脈貫心而過兩腎有兩管通督脈故曰心腎相交此五臟飲食氣血津液之運用也至若臟腑之形象王勳臣先生所繪圖記已詳余無庸贅敘焉聊城李志銳晉恆書醫林改錯後醫林改錯一書勳臣先生窮數十年之心力而成者余非不深佩也然而疑信參半蓋先生所親見皆屬有形無氣義塚之屍氣已散者也加刑之囚氣初散者也易曰天地定位山澤通氣人身軀殼以內物位之定也飲食之化精化液化血化大小便氣之通也余信先生明位之定而執之余僭疑先生未能擴氣之通而充之也故先生之畫氣血為此疆彼界者余以為論病則有在氣在血之分論平人則氣與血相依附血恃氣以流通也先生又謂心無血不能生靈機靈機在腦者余以為人心有記有悟記者心入之而腦為收之也悟者心發之而腦為付之也所謂君主也謂腦貯靈機則可謂心不生靈機則不可也病氣厥則無知識者先賢以厥為逆腦以靈機付心而心發之者必自上順下故逆則無知識也泰西人謂憶往事必目上瞪思索者正以心上取靈機於腦也迨思而得之是腦已將靈機下付於心而目不上瞪矣生人之心即肉即血死後之心血凝而渾融於肉中見肉不能見血故必刃先傷心而死者始見為有血也先生又謂手腕跳動處為氣管而駁論脈之脈為血脈一言為誤未揣下文百骸貫通四字惟其貫也通也故血脈也不貫不通是誠氣管矣生人有氣故通死則無氣故不通先生所親見皆無氣者余故信先生明位之定而執之余故僭疑先生未能擴氣之通而充之也竊謂人身氣與血相依附血恃氣以流通也如人皮膚小有破傷血即隨出蓋傷則氣泄氣泄則血亦隨泄氣無形故所見惟血所傷小則周身大氣自然能包舉而傷處闔闔則氣無從泄而血亦止矣若極刑之囚刃從胸剸所傷大則氣大泄血亦隨氣大泄氣無形其泄速血有形其泄遲先生所謂先泄之血速後泄之血遲者乃始則氣大奔而速繼則氣微弱而遲終則氣先盡而所餘之血存於膈膜上低處矣周身血之失氣而不能奔者亦隨其經歷處而凝矣先生於病死者之膈膜自云未見的確想其中定無一窪存血也由是思大吐大衄而即氣脫死者咽喉中鼻中亦定有存血也夫咽喉中鼻中非平人存血之所也仁和徐然石亞枝讀全體新論人身如樹分冬春脈胳為干心為根心涵靈液注經隧大而祖絡微而孫枝枝葉葉盡滲漉如縵如網如絲綸儼然春華得生意土膏暗潤潛無痕絡窮四末復回溯更以靈液還天君又如冬林氣蕭瑟直驅膏向根荄屯屯久氣轉漸牙茁升降往返侔旋輪腦為覺元神所尊有如群岳宗崑崙鼓楟元牝出奧竅容納萬象棲神魂上仙葆此大丹就泥丸宮破通天門下愚生為二豎據懵懂劣似劉家豚人生思索必撫腦心囟上下交氤氳黃庭宗旨蒼頡字古人卓識超群倫惜哉黃帝與岐伯方書久已遺三墳詹詹靈樞數番紙多半贗鼎非原文所以扁鵲至今千百載上池之水流常渾歐羅此一編創論何紛壇一一目親睹疏瀹入骨筋華佗之稿尚未焚流落海外隨煙雲暢觀快極復生妒疑陣又欲張吾軍心何為兮倚杵脾何為兮橫陳將軍倉廩位置倒嬰兒奼女誰為婚吾非丹元子又非龍煙神安能入肺腑持炬照覆盆八尺之士縱可剖而視旋機一駐氣早亡陶熏胡為行度考校乃爾確無乃如柱膠瑟如治絲而棼我欲廣集中外議汰其糟粕留其醇使人垣洞見癥結昭揭日月殊槃捫譬如管輅論天象但以區落言星辰至於陰陽呼召可會不可說默而成者存其人學問要當貴適用豈以畛域生區分君不見三角八線傳自利瑪竇仁廟研究窮朝昏聖人門戶之見何嘗存望聞問切名曰四診人皆知之夫診者審也審察病情必四者相合而可斷其虛實寒熱之何因也然望者不僅望其面色也五官鬚髮並宜審也而舌本苔色尤為至要此古人未發之奧王氏準繩張氏醫通葉氏溫熱論諸書皆須熟玩更有諸書所未言者淡白舌苔亦有熱證黃厚滿苔亦有寒證舌絳無津亦有痰證當以脈證便溺參勘自得若燈下看黃苔每成白色諺云燈下黃金似白銀是也白苔啖酸物能染為黑均不可不知至於危疑大證雖吐出之痰血接出之便溺亦當令病家取至庭中望其色而審之不可嫌穢庶無訛傳誤聽之弊也治小兒則審三關為要注白苔食橄攬即黑食枇杷即黃此名染苔抹之即去字義有不可執一者如知字從口以口能知味也然望而知之者目也豈可謂目無所知哉故聞字雖從耳而四診之聞不專主於聽聲也戴麟郊先生廣溫疫論辯證最細謂疫證必有穢濁之氣鼻觀精者可以聞而知之也愚謂聞字實有二義雖非疫證凡入病室五官皆宜並用問答可辨其口氣有痰須詢其臭味榻前虎子觸鼻可分其寒熱癰瘍膿血審氣即知其重輕余如鼾息腸鳴矢氣之類皆當以耳聞者古人但主乎呼歌呻哭數字固矣問診之法最要詳細雖證因錯雜但貴心有權衡則可審其輕重真偽而折衷於當矣景岳十問篇人皆服其周匝而猶未盡善也如問寒熱首二條皆是傷寒若發熱不惡寒者溫病也縱挾新感風寒而起先有惡寒迨一發熱則必不惡寒矣此伏氣溫病也外感風溫熱邪首先犯肺肺主皮毛熱則氣張而失清肅之權腠理反疏則凜冽惡寒然多口渴易汗脈證與傷寒迥異終云氣盛身寒得之傷寒氣虛身熱得之傷暑所謂身寒者寒邪在表雖身熱而仍惡寒也暑為陽邪發熱即惡熱亦有背微惡寒者曰微仍不甚惡寒也況但在背與周身惡寒迥別可不細問哉第三條內證發熱亦不可專屬陰虛香岩先生云或食積或瘀血或痰凝氣滯皆能發熱必辨證明白庶不誤治問頭身第三條陰虛頭痛葉氏云多屬陽亢未可竟補須兼滋陰降火為治第四條陽虛頭痛百無一二之證至於眩運不可與頭重混同立論如體肥過食厚味醇酒胃中必有痰飲隨肝火升騰而作暈者余每用二陳加梔連柴芍天麻鉤藤而愈者多虛則加參術瘦人胸無阻滯胃中無痰可用地黃湯加柏芍之類蓋此證因痰火者多長沙治眩亦以痰飲為先也頭重則屬濕者多火盛者用清涼以降之經云邪之所在皆為不足上氣不足腦為之不滿耳為之苦鳴是言邪乘虛客之非竟言虛也景岳於二證皆主上虛清陽不升亦百中一二耳刊頭項脊背腰膂臂腿諸疼有內傷外感之別內傷多虛亦屬氣不宣行外感多實總由客邪阻氣李晉恆別駕謂督是一身總氣管知此可悟其治法矣問便雲中氣不足溲便為之變不可因溺黃而謂之火強逼枯汁以斃人葉氏謂妄用通利則逼枯汁如養陰清熱何至逼枯若經言變者非云小溲黃赤也統指二便異於常時也小溲或不禁或淋漓短少頻數或清而多大便或滑泄或燥結皆異於平日之調和故謂之變況勞倦焦思瀉利酒色為虛火若暑熱下痢小溲淋痛乃邪火當分別而治不可云無火而用溫補以誤人經言邪之所在皆為不足因不足而邪客之為病後人脫卻上文邪之所在句竟言虛而用補謬矣大便亦要調和若愈固者乃燥結也當濡養為主或固結在老年防有噎膈之患不可云彌固彌良愚謂大便固結必胸腹舒泰飲食能安圊不努掙者始為可喜溏而頻解解而腹中始快者此內經所云得後與氣則快然而衰也非痰飲內阻則氣鬱不宣即泄瀉在溫熱暑疫諸病正是邪之去路故不可一聞溏瀉輒以為虛寒而妄投溫補止澀也須問其解之熱與不熱色之正與不正必不覺其熱而稀溏色正者始可斷為中氣不足也更有癰疽痘疹將發而吐瀉先作者前輩皆不說明故詳贅之問飲食謂得食稍安者必是虛證未盡然也痰火證蟲證皆得食稍安而痰火證更有初服溫補極相安者其中消善食屬於火者是實證矣亦有火盛反不能食者胃熱不殺穀也更有陰液久耗胃陽陡越之除中證能食善飢儼如消證但脈必虛大按之細軟無神縱與大劑填陰亦不救也雖不多見不可不知至於熱證喜飲寒證惡飲人皆知之而熱證夾濕夾痰者亦不喜飲或喜沸飲皆不可誤指為寒也喜飲而不多者古人但以為陰虛而不知亦有挾痰飲者問胸葉氏云胸腹脹滿固不可補不知飢飽似脹非脹是濁氣不清但當理滯氣不宜驟用參術補住濁氣而為脹滿經云濁氣不降則生䐜脹即宜補者須分氣血虛而兼滯者疏補宜兼俗云虛不受補者未知疏補兼行之法耳愚謂胸次如天天空則生氣流行不息然虛痞可補之證間亦有之氣虛者宜溫補陰虛者宜滋填若痰飲凝聚飲食停滯及溫熱疫證邪踞募原者皆宜開泄為先不但補藥忌投即涼潤之品亦在所禁恐病人言之未確醫者必手按其胸腹有無堅硬拒按始可斷其邪之聚散最為診要更有內癰一證尤當留意問聾此證在傷寒為邪傳少陽在久病為精脫景岳顢頇而論大是誤人且考古更有耳聾治肺之法一瓢先生云金之結穴在耳中名曰籠蔥專主乎聽故熱證耳聾皆為金受火爍治當清肺不可泥定少陽一經而再以小柴胡湯益其病也刊友人沈君辛甫患溫耳聾四明醫人胡士揚用柴胡藥多劑其聾日甚胡謂進則病進徑投補劑後服清解病愈而聾成錮疾是肺絡之熱為補藥壅塞竟無出路也然景岳書之貽誤於後世此猶其小者已問渴謂喜熱飲為中寒水虧葉氏云水虧則內熱豈有中寒之理凡喜熱飲皆鬱滯不通暢故得熱則快得冷則遏並非水虧也若水涸精虧者宜滋陰反用熱藥是殺之也刊渴喜熱飲渴不多飲溫熱證多有之皆屬痰飲阻遏氣機景岳書偏尚溫補世多尚之葉天士先生景岳發揮尤在涇醫學讀書記章虛谷醫門棒喝皆力辨其非學者不可不讀也女子病首須問帶蓋帶者女子生而即有故越人作女科稱帶下醫也下多即為病矣十二歲以外者問其月事行否未行而膚色淖澤者雖逾笄不為病設膚色憔悴人不長成是勞損也已行之女與婦人則詢其汛之遲速血之紫淡雖患外感亦當問明姅期遠近然後審證用藥庶無礙血傷胎之患蓋姅期有禁用之藥胎孕有難憑之脈也產後則惡露之多少腹塊之有無首宜究詰然胎產諸證筆難盡罄總宜審問詳明處方靈活不可稍有執滯庶不誤人校天地生機皆在靈空女子之象離中虛也故能孕育若脂滿胞中者不能有妊此理之常也況胎元初結月事即停氣有餘為火血有餘為水火盛搏水則成痰嘔吐腫滿諸病由此而生補藥最宜慎用古云胎前無滯產後無虛是已然有極虛之婦受胎後即須培補始能長養者分娩時必須峻補始能誕育者既產之後血氣必虛矣丹溪先生垂大補氣血之訓而竟不盡然者以張景岳之偏尚溫補猶知其非可見治胎產病之難也且一人有一人之胎氣荊人舉六子皆二百七十六日而生慶兒雙兒琳兒並殤龍兒華兒如兒僉無夭相是兒休之堅脆不必在胎日數之多寡分也故七八個月生者亦育十餘月生者亦有不育嘗見同胞數人髮膚悉白皙如羊者斷非均於社日受孕殆亦胎氣使然耳又周縫人妻患經阻而腹脹漸甚諸藥無效年餘如抱甕如鐵石矣日夜呻吟欲其夫以槌擊腹若擂鼓然始覺稍舒最後求老醫浦沛霖先生治之浦診視良久細詰病情曰買不相欺愧未識其病也容我歸去討究書籍再為汝治數日後果來復診服藥仍不應縫人終日捶妻之腹不能成衣醫藥力竭遂聽之待死而已至兩年餘忽舉一子而脹病如失其子甚短小取名關保余常見之至十餘歲而夭胎孕之奇有如是者誠非筆所能罄也刊姅期有禁用之藥世俗惟知禁用寒劑因不知血分有火或營分伏暑者不但禁用熱藥即溫動之品亦禁宜寒宜涼對證者並不禁也第必取其有流利之性而無凝滯之偏者為良藥耳粗工泥於經產之禁而不詳審證因且古書每於方後注云婦人加當歸不知變通者遂膠柱以鼓瑟徐月岩令正年逾四旬暮春患痰嗽發熱醫者詢知病當汛後於荊防發散中加當歸薑棗為方服三劑血隨痰溢口舌起疱如紫蒲桃者八顆下唇右角腫凸如姆指大色如黑棗咽疼礙飲或云瓜瓤瘟或云蒲桃瘟或云玳瑁瘟或云捻頸瘟或云翻唇疔醫皆望而卻走月岩追憶乙巳之病浼余往視口穢噴人頰齶如漆舌紫而苔色如靛臂斑或黑或藍溲若沸油渴呃多汗脈形細澀數夜無眠此乃陰分素虧熱伏營分氣機鬱結痰阻上焦詢其胸背斑已遍身幸而血溢汗多毒邪猶有出路故不昏陷尚可望生令取錫類散吹喉並以童溺藕汁梨汁頻灌隨用元參丹參紫草花粉銀花梔子鮮斛大青竹茹枇杷葉夏桔草薔薇根海䖳煎調神犀丹兩劑後舌本轉赤苔色見黃四劑後血止咽松脈轉弦數六劑便行而口穢始減疱平而唇腫亦消八劑嗽平而苔退脈柔斑回而痕如黑漆始改輕清善後徑愈又內子月事素調春仲患上齦右痛不腫痛連額角鼻亦右塞目中出火齒縫流血苔黃滑而不渴痛甚則肢冷麵赤口涎大流胸次不舒便堅溲熱脈至緩滑汛事逾期不至亦是熱伏營分痰阻氣機也以小陷胸加元參紫苑菖蒲竹茹枳實旋覆花煎調神犀丹四服便行經至而瘳聊附二案以見大意又張氏婦年五十歲自季夏患嘔吐漸難飲食食必膈痛傾囊而出夾以痰水多藥罔效至盂冬汛愆一度以後仍行而痛吐不已人漸委頓不能起榻大便甚艱咸謂噎膈已成迨初春胎墜而病若失蓋其年逾七七天癸未絕既未停經而患痛吐初不料為惡阻也古云寧治十男子莫治一婦人其以此夫胎前最忌滲利無濕者雖茯苓亦須避之室女眼藥禁用虎骨恐初娩時交骨難開也相傳人之胚胎鼻先受形而泰西書云胚胎三十日具有眼模六十日始有耳鼻余按佩觿集吉凶形兆謂之聯眹字從目所云眼模正眹兆之初萌也其言頗有理惟嬰幾倒植在腹之說恐未必盡然耳又沛翁令郎上林先生世其業憶嘉慶己卯春先府君病溫而大便自利諸醫皆宗陶氏傷寒書者悉用柴葛升提下陷之邪屢服不應或云漏底證漸進溫補病日以劇將治木矣父執翁七丈薦上林先生來視其年甚少診畢曰溫證也殆誤認傷寒而多服溫燥之藥耶幸而自利不止熱勢尚有出路否則早成灰燼矣安有今日乎即用大劑犀角石膏銀花花粉鮮生地麥冬等藥囑煎三大碗置於榻前頻頻灌之藥未煎成之際令先笮青蔗漿恣飲之諸親長見方相顧莫敢決幸內有先慈主持外仗金履思丈力排眾議遂煎其藥如法灌之一周時始竣病即起色因以漸愈時雄年甫十二聆浦言而心識之逾二載府君捐館雄餬口遠遊聞上林先生以善用清涼為眾口所爍乃從事於景岳而以溫補稱枉道徇人惜哉切脈列於四診之末者以脈之名目有限而病之證候無窮也證既不可以脈該故先以可見可聞者而審之然後切脈之情合證之形四診相合病無遁情設有不符必有其故或從或舍自有機宜神而明之存乎其人校上論看法此先大父遺稿隨其意之所到而筆之不分門類故曰隨筆先府君輯注未竟亦遽棄養升於醫學未嘗深究是以不敢補註敬為詮次繕成清本以待鐫云嘉慶二十一年端陽後二日孫升謹校刊全體新論云凡人一呼一吸合為一息以人身本熱呼者吐炭氣也吸者接天地之生氣也故屏息少頃即怫鬱不安必長噓乃定人身百脈應血而動以時表較之每一暋呢平人呼吸十八息脈七十至或七十五至孩提之年有百三十至者老人有六十至或五十至者婦女比男子約多十至若以一人而論企坐行臥脈即不同企比坐時快七八至坐比臥時快三四至他如飽快於飢日快於夜顧亦隨時變更耳如行動驚恐酒醉之後更無定至此遍體皆然不獨手足頸前始名為脈但他處脈管有肉護藏不易按摩故但切於手足頸前也今則獨切手脈以手脈之下有骨乘墊可以重抑輕按可以對面望問且伸縮便捷左宜右有取乎診察之便耳江筆花云切脈一道不過辨其浮沉以定表裡遲數以分寒熱強弱以判虛實其他則胸中了了指下難明且時大時小忽浮忽沉六脈亦難定準故醫家謂據脈定證是欺人之論也雄按內經云形肉已脫九候雖調猶死夫至形肉已脫九候尚調則其形肉未脫之先脈之平和更可知矣即難經所云氣口脈平而死者生氣絕於內也此人病脈不病不可據脈以斷證也然脈病人不病握臂可知其死期者余於陳鐵橋學士汪少海司馬皆驗之矣惟沈悅亭茂才次女無病而見疾如風雨之脈斷其半年必死後年余診脈仍八至今歸於範氏半年矣脈之可憑不可憑者如此然畢竟可憑處多不過微妙難言變化不易測耳曾王父一言以蔽之曰神而明之學者其可不盡心乎雄幼而失怙未嘗學問為繼先人志專攻軒岐之術雖泛覽群書而實折衷於此其所以遲之又久而不即梓行者非敢怠也意欲補列諸證詳加闡發奈限於學識困於奔走因循至今不遑纘述然駒光過隙懼或失傳讀失舅氏弁言輒為汗下敬節其衣食之貲間附以穴阫之見授諸梨棗用質通方舉一反三莫云未備咸豐二年壬子元旦曾孫士雄謹刊往歲俞博泉令弟東池之女汛事如常忽於三月中旬陡然血溢鎮海汪某與大劑溫補藥數劑血雖止而氣逆身熱褚某改用滋填藥不效沈某謂為溫感連服清解亦不應邀余視之形色已奪喘汗便溏脈數無倫痰多食少身熱時作徹夜無眠曰急勞也不可以夏病家暨諸醫僉云平素無病縱使成勞定可望延萬或不救亦須百日為期何遽不可夏乎余曰千金翼炙甘草湯下明言危急者十一日死夫上損至胃下損及脾損及三臟至速亦須百日惟病情未露之先人自不覺其內損故一旦卒發遂危急而不可救藥也然其病發之前脈必有徵所謂脈病人不病之行屍即病情未露之稱耳病家不信復招汪某治之亦以為血止受感進藥三劑而殞果立夏前一日也前年冬沈煥章令郎患恙醫作冬溫治數日後忽形脫神散其居停吳君曲城拉余往視脈色皆奪略無感象曰急勞也危期在十一朝乎已而果然此雖一時偶中然急勞證余案中屢載而千金翼所言人猶疑之謂虛勞無旬余之證殆未以行屍之說互參耳門人問及此條適茲刊將竟乃附識之亦有但憑一脈不察病情因而絕人長命者尤難縷述噫循名而不責實誤盡天下蒼生醫其一事也良可痛哭已旃蒙單閼上元日士雄補筆
